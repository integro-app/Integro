<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>INTEGRO - Captador</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link href="css/integro-theme.css" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0;font-family:"Inter",sans-serif}
    :root{--nav:#061a35;--nav2:#092b61;--bg:#f3f7fc;--card:#fff;--text:#071a33;--muted:#64748b;--line:#e2e8f0;--orange:#ff8a00;--orange2:#ffb100;--green:#16c784;--blue:#1683ff;--red:#ff405d;--shadow:0 18px 45px rgba(15,23,42,.08)}
    body{min-height:100vh;background:var(--bg);color:var(--text);overflow-x:hidden}
    button,input,select,textarea{font-family:inherit}
    button{border:0;cursor:pointer}
    input,select,textarea{width:100%;border:1px solid var(--line);border-radius:12px;padding:12px;background:#fff;color:var(--text);font-weight:800;outline:none}textarea{min-height:90px;resize:vertical}
    label{display:block;color:#475569;font-size:13px;font-weight:900;margin-bottom:7px}
    .layout{display:flex;min-height:100vh}
    .sidebar{width:292px;background:linear-gradient(180deg,var(--nav),var(--nav2));color:#fff;padding:24px 18px;position:fixed;inset:0 auto 0 0;overflow-y:auto;z-index:50;transition:.25s}
    .brand{font-size:32px;font-weight:900;margin-bottom:22px}.brand span{color:var(--orange2)}
    .user-card{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);border-radius:18px;padding:16px;margin-bottom:22px}.user-card strong{display:block}.user-card small{display:block;color:#cbd5e1;font-weight:700;margin-top:4px}
    .menu-title{color:#8fb4dc;font-size:12px;font-weight:900;text-transform:uppercase;margin:18px 6px 10px}
    .menu-item{width:100%;height:50px;border-radius:13px;background:transparent;color:#eaf3ff;font-weight:800;text-align:left;padding:0 14px;margin-bottom:7px}.menu-item.active,.menu-item:hover{background:linear-gradient(135deg,var(--orange2),var(--orange));color:#fff}
    .mobile-menu-btn{position:fixed;top:14px;left:14px;width:52px;height:52px;border-radius:14px;background:#fff;border:1px solid var(--line);font-size:24px;font-weight:900;box-shadow:var(--shadow);display:none;z-index:10000}
    .overlay{position:fixed;inset:0;background:rgba(2,6,23,.58);opacity:0;visibility:hidden;transition:.2s;z-index:9998}.overlay.show{opacity:1;visibility:visible}
    .main{margin-left:292px;width:calc(100% - 292px);padding:28px 32px}
    .topbar{display:flex;justify-content:space-between;gap:16px;align-items:flex-start;margin-bottom:22px}.topbar h1{font-size:30px;font-weight:900}.topbar p{color:var(--muted);font-weight:700;margin-top:6px}
    .actions{display:flex;gap:10px;flex-wrap:wrap}.btn{height:46px;border-radius:12px;padding:0 15px;font-weight:900;background:#fff;border:1px solid var(--line);color:var(--text)}.btn.primary{background:linear-gradient(135deg,var(--orange2),var(--orange));color:#fff;border:0}.btn.danger{background:#fff1f2;color:#be123c;border-color:#fecdd3}
    .status{display:none;border-radius:14px;padding:12px 14px;margin-bottom:16px;font-weight:800}.status.show{display:block}.status.info{background:#eff6ff;color:#1d4ed8}.status.err{background:#fff1f2;color:#be123c}.status.ok{background:#ecfdf5;color:#15803d}
    .kpis{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:16px;margin-bottom:18px}.kpi{background:#fff;border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow);padding:18px}.kpi small{color:var(--muted);font-weight:900;text-transform:uppercase}.kpi strong{display:block;font-size:28px;margin-top:8px}
    .panel{background:#fff;border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow);padding:20px;margin-bottom:18px}.panel-head{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:14px}.panel h2{font-size:20px}
    .grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}.full{grid-column:1/-1}
    .table-wrap{overflow:auto;border:1px solid var(--line);border-radius:14px}table{width:100%;border-collapse:collapse;background:#fff}th,td{padding:12px;border-bottom:1px solid var(--line);font-size:13px;text-align:left;white-space:nowrap}th{background:var(--nav);color:#dbeafe;text-transform:uppercase;font-size:11px}tbody tr{cursor:pointer}tbody tr:hover{background:#f8fafc}.empty{border:1px dashed #cbd5e1;border-radius:14px;padding:18px;color:#475569;font-weight:800;background:#f8fafc}
    .badge{display:inline-flex;border-radius:999px;padding:6px 9px;font-size:12px;font-weight:900;background:#f1f5f9;color:#475569}.badge.ok{background:#ecfdf5;color:#15803d}.badge.warn{background:#fefce8;color:#a16207}.badge.info{background:#eff6ff;color:#1d4ed8}
    .drawer{position:fixed;inset:0;z-index:12000;display:none}.drawer.show{display:block}.drawer-bg{position:absolute;inset:0;background:rgba(2,6,23,.58)}.drawer-content{position:absolute;right:0;top:0;height:100%;width:min(620px,100%);background:#fff;box-shadow:-22px 0 48px rgba(2,6,23,.22);display:flex;flex-direction:column}.drawer-head{padding:20px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;gap:12px}.drawer-body{padding:20px;overflow:auto}.drawer-close{width:42px;height:42px;border-radius:12px;background:#f8fafc;color:#334155;font-weight:900}.kv{display:grid;grid-template-columns:160px 1fr;gap:8px;border-bottom:1px solid var(--line);padding:10px 0}.kv b{color:#475569}
    @media(max-width:1100px){.kpis{grid-template-columns:repeat(2,minmax(0,1fr))}}
    @media(max-width:860px){.mobile-menu-btn{display:block}.sidebar{transform:translateX(-105%);z-index:9999}.sidebar.show{transform:translateX(0)}.main{margin-left:0;width:100%;padding:82px 14px 18px}.topbar{flex-direction:column}.actions{width:100%}.btn{flex:1}.kpis,.grid{grid-template-columns:1fr}.table-wrap table,.table-wrap thead,.table-wrap tbody,.table-wrap tr,.table-wrap th,.table-wrap td{display:block}.table-wrap thead{display:none}.table-wrap tr{border-bottom:1px solid var(--line);padding:10px}.table-wrap td{border:0;padding:7px 4px;white-space:normal}.table-wrap td::before{content:attr(data-label);display:block;color:#64748b;font-size:11px;font-weight:900;text-transform:uppercase;margin-bottom:2px}}
  </style>
</head>
<body>
  <button class="mobile-menu-btn" type="button" onclick="toggleMenuCaptador()">☰</button>
  <div id="overlayCaptador" class="overlay" onclick="fecharMenuCaptador()"></div>
  <div class="layout">
    <aside id="sidebarCaptador" class="sidebar">
      <div class="brand">ÍN<span>TEGRO</span></div>
      <div class="user-card">
        <strong id="captadorNome">Captador</strong>
        <small id="captadorTenant">Tenant</small>
        <small>Indicações</small>
      </div>
      <div class="menu-title">Operação</div>
      <button class="menu-item active" type="button" onclick="trocarTelaCaptador('nova')">Nova indicação</button>
      <button class="menu-item" type="button" onclick="trocarTelaCaptador('minhas')">Minhas indicações</button>
      <button class="menu-item" type="button" onclick="trocarTelaCaptador('relatorio')">Relatório</button>
      <div class="menu-title">Sessão</div>
      <button class="menu-item" type="button" onclick="logout()">Sair</button>
    </aside>
    <main class="main">
      <div class="topbar">
        <div>
          <h1>Captador</h1>
          <p>Cadastro de indicações reais, acompanhamento de status e relatório por conversão.</p>
        </div>
        <div class="actions">
          <button class="btn" type="button" onclick="carregarCaptador()">Atualizar</button>
          <button class="btn primary" type="button" onclick="trocarTelaCaptador('nova')">Nova indicação</button>
        </div>
      </div>
      <div id="statusCaptador" class="status"></div>
      <section class="kpis">
        <div class="kpi"><small>Recebidas</small><strong id="capRecebidas">0</strong></div>
        <div class="kpi"><small>Em atendimento</small><strong id="capAtendimento">0</strong></div>
        <div class="kpi"><small>Convertidas</small><strong id="capConvertidas">0</strong></div>
        <div class="kpi"><small>Encerradas</small><strong id="capEncerradas">0</strong></div>
      </section>
      <section id="telaNovaCaptador" class="panel">
        <div class="panel-head"><h2>Nova indicação</h2></div>
        <form id="formIndicacaoCaptador" class="grid" onsubmit="salvarIndicacaoCaptador(event)">
          <div><label>Nome do cliente</label><input id="capNomeCliente" required></div>
          <div><label>Telefone principal</label><input id="capTelefone" required inputmode="tel"></div>
          <div><label>CPF/CNPJ</label><input id="capDocumento" inputmode="numeric"></div>
          <div><label>Origem</label><select id="capOrigem"><option value="CAPTACAO">Captação</option><option value="INDICACAO">Indicação</option><option value="WHATSAPP">WhatsApp</option><option value="RUA">Rua</option><option value="OUTRO">Outro</option></select></div>
          <div><label>Vendedor destino</label><select id="capVendedor"><option value="">Sem vendedor definido</option></select></div>
          <div><label>Equipe destino</label><select id="capEquipe"><option value="">Sem equipe definida</option></select></div>
          <div class="full"><label>Endereço/resumo</label><input id="capEndereco"></div>
          <div class="full"><label>Observação</label><textarea id="capObservacao"></textarea></div>
          <div class="full actions">
            <button id="btnSalvarIndicacaoCaptador" class="btn primary" type="submit">Salvar indicação</button>
            <button class="btn" type="button" onclick="limparFormCaptador()">Cancelar</button>
          </div>
        </form>
      </section>
      <section id="telaMinhasCaptador" class="panel" style="display:none">
        <div class="panel-head">
          <h2>Minhas indicações</h2>
          <select id="filtroStatusCaptador" onchange="renderCaptador()" style="max-width:220px">
            <option value="">Todos os status</option>
            <option value="RECEBIDA">Recebida</option>
            <option value="ATRIBUIDA">Atribuída</option>
            <option value="EM_ATENDIMENTO">Em atendimento</option>
            <option value="CONVERTIDA">Convertida</option>
            <option value="NAO_CONVERTIDA">Não convertida</option>
            <option value="RECUSADA">Recusada</option>
            <option value="CANCELADA">Cancelada</option>
          </select>
        </div>
        <div id="listaIndicacoesCaptador"></div>
      </section>
      <section id="telaRelatorioCaptador" class="panel" style="display:none">
        <div class="panel-head"><h2>Relatório</h2></div>
        <div id="relatorioCaptador"></div>
      </section>
    </main>
  </div>
  <div id="drawerCaptador" class="drawer">
    <div class="drawer-bg" onclick="fecharDrawerCaptador()"></div>
    <div class="drawer-content">
      <div class="drawer-head">
        <div>
          <h2 id="drawerCaptadorTitulo">Indicação</h2>
          <p id="drawerCaptadorSub"></p>
        </div>
        <button class="drawer-close" type="button" onclick="fecharDrawerCaptador()">×</button>
      </div>
      <div id="drawerCaptadorBody" class="drawer-body"></div>
    </div>
  </div>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
  <script src="js/config.js"></script>
  <script src="js/utils/operational.js"></script>
  <script src="js/utils/ui-helpers.js"></script>
  <script src="js/state.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/services/firestore.js"></script>
  <script src="js/services/indicacoes-service.js"></script>
  <script src="js/auth.js"></script>
  <script>
    const CAPTADOR = { tela: "nova", indicacoes: [], vendedores: [], equipes: [] };

    function msgCaptador(texto, tipo = "info") {
      const el = document.getElementById("statusCaptador");
      if (!el) return;
      el.className = `status show ${tipo}`;
      el.textContent = texto;
    }

    function limparMsgCaptador() {
      const el = document.getElementById("statusCaptador");
      if (el) el.className = "status";
    }

    function toggleMenuCaptador() {
      document.getElementById("sidebarCaptador")?.classList.toggle("show");
      document.getElementById("overlayCaptador")?.classList.toggle("show");
    }

    function fecharMenuCaptador() {
      document.getElementById("sidebarCaptador")?.classList.remove("show");
      document.getElementById("overlayCaptador")?.classList.remove("show");
    }

    function usuarioCaptador() {
      return State.getUsuario() || {};
    }

    function tenantCaptador() {
      return State.getTenantId();
    }

    function idUsuarioCaptador() {
      const u = usuarioCaptador();
      return u.id || u.usuarioId || u.uid || u.authUid || "";
    }

    function normalizarDoc(doc) {
      return { id: doc.id, ...(doc.data ? doc.data() : doc) };
    }

    async function consultarPorTenantCaptador(nome, limite = 100) {
      const tenant = tenantCaptador();
      if (!tenant) return [];
      const snap = await db.collection(nome).where("clientePlataformaId", "==", tenant).limit(limite).get();
      return snap.docs.map(normalizarDoc);
    }

    async function carregarCaptador() {
      const usuario = usuarioCaptador();
      const acesso = window.IntegroOperacional?.normalizarAcessoUsuario?.(usuario) || {};
      if (!acesso.isCaptador && !acesso.isMasterLocal && !acesso.isMasterGlobal) {
        msgCaptador("Acesso de captador não liberado para este perfil.", "err");
        return;
      }
      if (!tenantCaptador()) {
        msgCaptador("Tenant obrigatório para operar indicações.", "err");
        return;
      }
      msgCaptador("Carregando indicações reais...");
      const [indicacoes, usuarios, equipes] = await Promise.all([
        consultarPorTenantCaptador("indicacoes", 150),
        consultarPorTenantCaptador("usuarios", 150),
        consultarPorTenantCaptador("equipes", 100)
      ]);
      const meuId = idUsuarioCaptador();
      CAPTADOR.indicacoes = acesso.isCaptador
        ? indicacoes.filter(i => String(i.indicadoPorId || i.captadorId || i.criadoPor || "") === String(meuId))
        : indicacoes;
      CAPTADOR.vendedores = usuarios.filter(u => {
        const a = window.IntegroOperacional?.normalizarAcessoUsuario?.(u) || {};
        return a.isVendedor && String(u.status || "ATIVO").toUpperCase() !== "BLOQUEADO";
      });
      CAPTADOR.equipes = equipes.filter(e => String(e.status || "ATIVA").toUpperCase() !== "INATIVA");
      preencherCombosCaptador();
      atualizarKpisCaptador();
      limparMsgCaptador();
      renderCaptador();
    }

    function preencherCombosCaptador() {
      const vendedor = document.getElementById("capVendedor");
      const equipe = document.getElementById("capEquipe");
      if (vendedor) {
        vendedor.innerHTML = '<option value="">Sem vendedor definido</option>' + CAPTADOR.vendedores.map(v => `<option value="${v.id}">${v.nome || v.email || v.id}</option>`).join("");
      }
      if (equipe) {
        equipe.innerHTML = '<option value="">Sem equipe definida</option>' + CAPTADOR.equipes.map(e => `<option value="${e.id}">${e.nome || e.nomeEquipe || e.id}</option>`).join("");
      }
    }

    function statusIndicacaoCaptador(i) {
      return window.IntegroIndicacoes?.normalizarStatusIndicacao?.(i.statusIndicacao || i.status) || String(i.statusIndicacao || i.status || "RECEBIDA");
    }

    function atualizarKpisCaptador() {
      const lista = CAPTADOR.indicacoes;
      document.getElementById("capRecebidas").textContent = lista.filter(i => statusIndicacaoCaptador(i) === "RECEBIDA").length;
      document.getElementById("capAtendimento").textContent = lista.filter(i => ["ATRIBUIDA", "EM_ATENDIMENTO"].includes(statusIndicacaoCaptador(i))).length;
      document.getElementById("capConvertidas").textContent = lista.filter(i => statusIndicacaoCaptador(i) === "CONVERTIDA").length;
      document.getElementById("capEncerradas").textContent = lista.filter(i => ["NAO_CONVERTIDA", "RECUSADA", "CANCELADA", "DUPLICADA"].includes(statusIndicacaoCaptador(i))).length;
    }

    function trocarTelaCaptador(tela) {
      CAPTADOR.tela = tela;
      document.getElementById("telaNovaCaptador").style.display = tela === "nova" ? "block" : "none";
      document.getElementById("telaMinhasCaptador").style.display = tela === "minhas" ? "block" : "none";
      document.getElementById("telaRelatorioCaptador").style.display = tela === "relatorio" ? "block" : "none";
      document.querySelectorAll(".menu-item").forEach(btn => btn.classList.remove("active"));
      [...document.querySelectorAll(".menu-item")].find(btn => btn.textContent.toLowerCase().includes(({ nova: "nova", minhas: "minhas", relatorio: "relatório" })[tela]))?.classList.add("active");
      fecharMenuCaptador();
      renderCaptador();
    }

    function renderCaptador() {
      renderListaCaptador();
      renderRelatorioCaptador();
    }

    function indicacoesFiltradasCaptador() {
      const filtro = String(document.getElementById("filtroStatusCaptador")?.value || "");
      return CAPTADOR.indicacoes.filter(i => !filtro || statusIndicacaoCaptador(i) === filtro);
    }

    function renderListaCaptador() {
      const el = document.getElementById("listaIndicacoesCaptador");
      if (!el) return;
      const lista = indicacoesFiltradasCaptador();
      if (!lista.length) {
        el.innerHTML = '<div class="empty">Nenhuma indicação encontrada para os filtros atuais.</div>';
        return;
      }
      el.innerHTML = `
        <div class="table-wrap">
          <table>
            <thead><tr><th>Cliente</th><th>Telefone</th><th>Status</th><th>Vendedor</th><th>Entrada</th></tr></thead>
            <tbody>
              ${lista.map((i, idx) => `
                <tr onclick="abrirIndicacaoCaptador(${idx})">
                  <td data-label="Cliente">${i.nomeClienteSnapshot || i.nome || "-"}</td>
                  <td data-label="Telefone">${i.telefonePrincipal || i.telefone || "-"}</td>
                  <td data-label="Status"><span class="badge ${statusIndicacaoCaptador(i) === "CONVERTIDA" ? "ok" : "info"}">${statusIndicacaoCaptador(i)}</span></td>
                  <td data-label="Vendedor">${i.vendedorDestinoNome || i.vendedorNome || i.vendedorDestinoId || "-"}</td>
                  <td data-label="Entrada">${String(i.dataEntrada || i.dataRecebimento || i.criadoEmTexto || "").slice(0, 10) || "-"}</td>
                </tr>
              `).join("")}
            </tbody>
          </table>
        </div>`;
    }

    function renderRelatorioCaptador() {
      const el = document.getElementById("relatorioCaptador");
      if (!el) return;
      const rel = window.IntegroIndicacoes?.calcularRelatorioConversaoCaptadores?.(CAPTADOR.indicacoes) || [];
      if (!rel.length) {
        el.innerHTML = '<div class="empty">Sem dados reais para relatório.</div>';
        return;
      }
      el.innerHTML = `
        <div class="table-wrap">
          <table>
            <thead><tr><th>Captador</th><th>Recebidas</th><th>Convertidas</th><th>Não convertidas</th><th>Taxa</th></tr></thead>
            <tbody>
              ${rel.map(r => `
                <tr>
                  <td data-label="Captador">${r.nome}</td>
                  <td data-label="Recebidas">${r.recebidas}</td>
                  <td data-label="Convertidas">${r.convertidas}</td>
                  <td data-label="Não convertidas">${r.naoConvertidas + r.recusadas}</td>
                  <td data-label="Taxa">${r.taxaConversao}%</td>
                </tr>
              `).join("")}
            </tbody>
          </table>
        </div>`;
    }

    async function salvarIndicacaoCaptador(event) {
      event.preventDefault();
      const usuario = usuarioCaptador();
      const btn = document.getElementById("btnSalvarIndicacaoCaptador");
      const vendedorId = document.getElementById("capVendedor").value;
      const vendedor = CAPTADOR.vendedores.find(v => v.id === vendedorId);
      const equipeId = document.getElementById("capEquipe").value || vendedor?.equipeId || "";
      const equipe = CAPTADOR.equipes.find(e => e.id === equipeId);
      const dados = {
        nome: document.getElementById("capNomeCliente").value.trim(),
        telefonePrincipal: document.getElementById("capTelefone").value.trim(),
        documento: document.getElementById("capDocumento").value.trim(),
        origemIndicacao: document.getElementById("capOrigem").value,
        vendedorDestinoId: vendedorId,
        vendedorDestinoNome: vendedor?.nome || vendedor?.email || "",
        equipeDestinoId: equipeId,
        equipeDestinoNome: equipe?.nome || equipe?.nomeEquipe || "",
        enderecoResumo: document.getElementById("capEndereco").value.trim(),
        observacao: document.getElementById("capObservacao").value.trim(),
        clientePlataformaId: tenantCaptador()
      };
      if (!dados.nome || !dados.telefonePrincipal) {
        msgCaptador("Informe nome e telefone para criar a indicação.", "err");
        return;
      }
      try {
        btn.disabled = true;
        msgCaptador("Salvando indicação...");
        await window.IntegroIndicacoes.criarIndicacao({ dados, usuario, db });
        limparFormCaptador();
        await carregarCaptador();
        trocarTelaCaptador("minhas");
        msgCaptador("Indicação criada com sucesso.", "ok");
      } catch (erro) {
        console.error("ERRO_INDICACAO_CAPTADOR", erro);
        msgCaptador(erro.message || "Erro ao criar indicação.", "err");
      } finally {
        btn.disabled = false;
      }
    }

    function limparFormCaptador() {
      document.getElementById("formIndicacaoCaptador")?.reset();
    }

    function abrirIndicacaoCaptador(indiceFiltrado) {
      const item = indicacoesFiltradasCaptador()[indiceFiltrado];
      if (!item) return;
      document.getElementById("drawerCaptadorTitulo").textContent = item.nomeClienteSnapshot || item.nome || "Indicação";
      document.getElementById("drawerCaptadorSub").textContent = statusIndicacaoCaptador(item);
      document.getElementById("drawerCaptadorBody").innerHTML = Object.entries(item)
        .filter(([_, v]) => typeof v !== "function")
        .map(([k, v]) => `<div class="kv"><b>${k}</b><span>${typeof v === "object" ? JSON.stringify(v) : String(v ?? "")}</span></div>`)
        .join("");
      document.getElementById("drawerCaptador").classList.add("show");
    }

    function fecharDrawerCaptador() {
      document.getElementById("drawerCaptador")?.classList.remove("show");
    }

    document.addEventListener("usuario-validado", () => {
      const usuario = usuarioCaptador();
      document.getElementById("captadorNome").textContent = usuario?.nome || usuario?.email || "Captador";
      document.getElementById("captadorTenant").textContent = State.getEmpresaNome() || State.getTenantId() || "Tenant";
      carregarCaptador();
    });
