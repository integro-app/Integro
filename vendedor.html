<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ÍNTEGRO - Vendedor</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
* { margin:0; padding:0; box-sizing:border-box; font-family:Inter; }

body { display:flex; height:100vh; background:#f5f7fb; }

.sidebar {
  width:240px;
  background:#071a33;
  color:#fff;
  padding:20px;
}

.logo { font-size:22px; font-weight:800; margin-bottom:30px; }

.menu-item {
  padding:12px;
  border-radius:8px;
  margin-bottom:10px;
}

.menu-item:hover { background:rgba(255,255,255,0.1); }

.main { flex:1; padding:20px; }

.topbar {
  display:flex;
  justify-content:space-between;
  margin-bottom:20px;
}

.cards {
  display:grid;
  grid-template-columns:repeat(auto-fit, minmax(180px,1fr));
  gap:15px;
}

.card {
  padding:20px;
  border-radius:16px;
  color:white;
  font-weight:600;
}

.card1 { background:linear-gradient(135deg,#ffb100,#ff6b00); }
.card2 { background:linear-gradient(135deg,#00c6ff,#0072ff); }
.card3 { background:linear-gradient(135deg,#22c55e,#15803d); }
.card4 { background:linear-gradient(135deg,#ef4444,#7f1d1d); }

</style>
</head>

<body>

<div class="sidebar">
  <div class="logo">ÍNTEGRO</div>
  <div class="menu-item">Dashboard</div>
  <div class="menu-item">Clientes</div>
  <div class="menu-item">Cobranças</div>
</div>

<div class="main">

  <div class="topbar">
    <h2>Dashboard Vendedor</h2>
    <div>🔔</div>
  </div>

  <div class="cards">
    <div class="card card1">Carteira Final</div>
    <div class="card card2">Caixa</div>
    <div class="card card3">Recebido</div>
    <div class="card card4">Inadimplência</div>
  </div>

</div>

<script>
const usuario = JSON.parse(localStorage.getItem("usuario"));

if (!usuario || usuario.tipoUsuario !== "vendedor") {
  alert("Acesso negado");
  window.location.href = "index.html";
}
</script>

</body>
</html>
