<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ÍNTEGRO - Master Local</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:"Inter",sans-serif}

    :root{
      --azul:#071a33;
      --laranja1:#ffb100;
      --laranja2:#ff6b00;
      --bg:#f4f7fb;
      --card:#ffffff;
      --texto:#0f172a;
      --muted:#64748b;
      --linha:#e2e8f0;
      --verde:#22c55e;
      --vermelho:#ef4444;
    }

    body{
      background:var(--bg);
      display:flex;
      min-height:100vh;
    }

    /* SIDEBAR */
    .sidebar{
      width:260px;
      background:var(--azul);
      color:white;
      padding:20px;
      position:fixed;
      height:100%;
      z-index:10;
    }

    .logo{
      font-size:22px;
      font-weight:900;
      margin-bottom:20px;
    }

    .menu-item{
      padding:12px;
      border-radius:10px;
      margin-bottom:8px;
      cursor:pointer;
      font-weight:700;
    }

    .menu-item:hover,
    .menu-item.active{
      background:linear-gradient(135deg,#ffb10033,#ff6b0033);
    }

    /* MAIN */
    .main{
      margin-left:260px;
      padding:20px;
      width:100%;
    }

    .top{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:20px;
    }

    .btn{
      padding:10px 14px;
      border:none;
      border-radius:8px;
      font-weight:700;
      cursor:pointer;
    }

    .btn-primary{
      background:linear-gradient(135deg,var(--laranja1),var(--laranja2));
      color:white;
    }

    .btn-danger{
      background:var(--vermelho);
      color:white;
    }

    .btn-ghost{
      background:white;
      border:1px solid var(--linha);
    }

    /* CARDS */
    .cards{
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:12px;
      margin-bottom:20px;
    }

    .card{
      background:white;
      padding:18px;
      border-radius:14px;
      box-shadow:0 10px 20px rgba(0,0,0,0.05);
      font-weight:800;
    }

    /* TABLE */
    table{
      width:100%;
      border-collapse:collapse;
    }

    th,td{
      padding:10px;
      border-bottom:1px solid #eee;
      font-size:13px;
    }

    th{
      text-align:left;
      color:#666;
    }

    /* DRAWER */
    .drawer-bg{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,0.4);
      display:none;
    }

    .drawer{
      position:fixed;
      right:0;
      top:0;
      width:400px;
      height:100%;
      background:white;
      padding:20px;
      transform:translateX(100%);
      transition:.3s;
    }

    .drawer.open{
      transform:translateX(0);
    }

    .drawer-bg.open{
      display:block;
    }

    input,select{
      width:100%;
      padding:10px;
      margin-bottom:10px;
      border-radius:8px;
      border:1px solid #ccc;
    }

    /* MOBILE */
    @media(max-width:900px){
      .sidebar{transform:translateX(-100%)}
      .sidebar.open{transform:translateX(0)}
      .main{margin-left:0}
      .cards{grid-template-columns:1fr 1fr}
    }
  </style>
</head>

<body>

<div class="sidebar" id="sidebar">
  <div class="logo">ÍNTEGRO</div>

  <div class="menu-item active" onclick="trocarTela('dashboard')">Dashboard</div>
  <div class="menu-item" onclick="trocarTela('usuarios')">Usuários</div>
  <div class="menu-item" onclick="trocarTela('clientes')">Clientes</div>
  <div class="menu-item" onclick="trocarTela('caixa')">Caixa</div>
  <div class="menu-item" onclick="trocarTela('solicitacoes')">Solicitações</div>

  <div class="menu-item" onclick="logout()">Sair</div>
</div>

<div class="main">

<div class="top">
  <h2 id="titulo">Dashboard</h2>
  <button class="btn btn-primary" onclick="abrirNovoUsuario()">Novo usuário</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard">

<div class="cards">
  <div class="card">Carteira: <span id="kpiCarteira">0</span></div>
  <div class="card">Clientes: <span id="kpiClientes">0</span></div>
  <div class="card">Usuários: <span id="kpiUsuarios">0</span></div>
  <div class="card">Caixas: <span id="kpiCaixas">0</span></div>
</div>

</div>

<!-- USUARIOS -->
<div id="usuarios" style="display:none">
<table>
<thead>
<tr>
<th>Nome</th>
<th>Email</th>
<th>Tipo</th>
<th>Ações</th>
</tr>
</thead>
<tbody id="tabelaUsuarios"></tbody>
</table>
</div>

<!-- CLIENTES -->
<div id="clientes" style="display:none">
<div id="listaClientes"></div>
</div>

</div>

<!-- DRAWER -->
<div class="drawer-bg" id="drawerBg" onclick="fecharDrawer()"></div>
<div class="drawer" id="drawer">
  <h3 id="drawerTitle"></h3>
  <div id="drawerContent"></div>
</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script src="js/firebase-config.js"></script>

<script>
let usuarioLogado = null;
let tenantId = "";

let usuariosCache = [];
let clientesCache = [];
let caixasCache = [];
let vendasCache = [];
let solicitacoesCache = [];

document.addEventListener("DOMContentLoaded", async () => {
  usuarioLogado = JSON.parse(localStorage.getItem("usuario"));

  if (!usuarioLogado) {
    alert("Sessão expirada.");
    window.location.href = "index.html";
    return;
  }

  if (usuarioLogado.tipoUsuario !== "master_local") {
    alert("Acesso negado.");
    window.location.href = "index.html";
    return;
  }

  tenantId =
    usuarioLogado.clientePlataformaId ||
    usuarioLogado.empresaId ||
    usuarioLogado.tenantId ||
    "";

  await carregarTudo();
});

function moeda(valor) {
  return Number(valor || 0).toLocaleString("pt-BR", {
    style: "currency",
    currency: "BRL"
  });
}

async function carregarTudo() {
  await Promise.all([
    carregarUsuarios(),
    carregarClientes(),
    carregarCaixas(),
    carregarVendas(),
    carregarSolicitacoes()
  ]);

  atualizarDashboard();
  renderUsuarios();
  renderClientes();
  renderSolicitacoes();
}

async function carregarUsuarios() {
  let ref = db.collection("usuarios").limit(100);

  if (tenantId) {
    ref = db.collection("usuarios")
      .where("clientePlataformaId", "==", tenantId)
      .limit(100);
  }

  const snap = await ref.get();
  usuariosCache = [];

  snap.forEach(doc => {
    usuariosCache.push({ id: doc.id, ...doc.data() });
  });
}

async function carregarClientes() {
  let ref = db.collection("clientes").limit(150);

  if (tenantId) {
    ref = db.collection("clientes")
      .where("clientePlataformaId", "==", tenantId)
      .limit(150);
  }

  const snap = await ref.get();
  clientesCache = [];

  snap.forEach(doc => {
    clientesCache.push({ id: doc.id, ...doc.data() });
  });
}

async function carregarCaixas() {
  let ref = db.collection("caixas").limit(100);

  if (tenantId) {
    ref = db.collection("caixas")
      .where("clientePlataformaId", "==", tenantId)
      .limit(100);
  }

  const snap = await ref.get();
  caixasCache = [];

  snap.forEach(doc => {
    caixasCache.push({ id: doc.id, ...doc.data() });
  });
}

async function carregarVendas() {
  let ref = db.collection("vendas").limit(150);

  if (tenantId) {
    ref = db.collection("vendas")
      .where("clientePlataformaId", "==", tenantId)
      .limit(150);
  }

  const snap = await ref.get();
  vendasCache = [];

  snap.forEach(doc => {
    vendasCache.push({ id: doc.id, ...doc.data() });
  });
}

async function carregarSolicitacoes() {
  let ref = db.collection("solicitacoes").limit(100);

  if (tenantId) {
    ref = db.collection("solicitacoes")
      .where("clientePlataformaId", "==", tenantId)
      .limit(100);
  }

  const snap = await ref.get();
  solicitacoesCache = [];

  snap.forEach(doc => {
    solicitacoesCache.push({ id: doc.id, ...doc.data() });
  });
}

function atualizarDashboard() {
  const carteira = clientesCache.reduce((total, c) => {
    return total + Number(c.saldoDevedor || c.saldo || 0);
  }, 0);

  document.getElementById("kpiCarteira").innerText = moeda(carteira);
  document.getElementById("kpiClientes").innerText = clientesCache.length;
  document.getElementById("kpiUsuarios").innerText = usuariosCache.length;
  document.getElementById("kpiCaixas").innerText = caixasCache.filter(c => c.status === "ABERTO").length;
}

function trocarTela(id) {
  ["dashboard", "usuarios", "clientes", "caixa", "solicitacoes"].forEach(tela => {
    const el = document.getElementById(tela);
    if (el) el.style.display = "none";
  });

  const atual = document.getElementById(id);
  if (atual) atual.style.display = "block";

  document.getElementById("titulo").innerText =
    id === "dashboard" ? "Dashboard" :
    id === "usuarios" ? "Usuários" :
    id === "clientes" ? "Clientes" :
    id === "caixa" ? "Caixa" :
    id === "solicitacoes" ? "Solicitações" :
    "ÍNTEGRO";

  document.querySelectorAll(".menu-item").forEach(item => item.classList.remove("active"));

  const menu = Array.from(document.querySelectorAll(".menu-item"))
    .find(item => item.getAttribute("onclick")?.includes("'" + id + "'"));

  if (menu) menu.classList.add("active");
}

function abrirDrawer(titulo, conteudo) {
  document.getElementById("drawerTitle").innerText = titulo;
  document.getElementById("drawerContent").innerHTML = conteudo;
  document.getElementById("drawer").classList.add("open");
  document.getElementById("drawerBg").classList.add("open");
}

function fecharDrawer() {
  document.getElementById("drawer").classList.remove("open");
  document.getElementById("drawerBg").classList.remove("open");
}

function renderUsuarios() {
  const html = usuariosCache.length
    ? usuariosCache.map(u => `
      <tr>
        <td>${u.nome || u.nomeCompleto || "-"}</td>
        <td>${u.email || "-"}</td>
        <td>${u.tipoUsuario || "-"}</td>
        <td>
          <button class="btn btn-ghost" onclick="abrirEditarUsuario('${u.id}')">Editar</button>
          <button class="btn btn-danger" onclick="alternarAcessoUsuario('${u.id}')">
            ${u.acessoLiberado === false ? "Liberar" : "Bloquear"}
          </button>
        </td>
      </tr>
    `).join("")
    : `<tr><td colspan="4">Nenhum usuário encontrado.</td></tr>`;

  document.getElementById("tabelaUsuarios").innerHTML = html;
}

function abrirNovoUsuario() {
  abrirDrawer("Novo usuário", `
    <input id="novoNome" placeholder="Nome completo">
    <input id="novoEmail" type="email" placeholder="Email">
    <select id="novoTipo">
      <option value="vendedor">Vendedor</option>
      <option value="supervisor">Supervisor</option>
      <option value="financeiro">Financeiro</option>
      <option value="master_local">Master Local</option>
    </select>
    <input id="novoCargo" placeholder="Cargo">
    <button class="btn btn-primary" onclick="salvarNovoUsuario()">Criar usuário</button>
  `);
}

async function salvarNovoUsuario() {
  try {
    const nome = document.getElementById("novoNome").value.trim();
    const email = document.getElementById("novoEmail").value.trim();
    const tipo = document.getElementById("novoTipo").value;
    const cargo = document.getElementById("novoCargo").value.trim();

    if (!nome || !email) {
      alert("Informe nome e email.");
      return;
    }

    const senhaPadrao = "123456";

    const secondaryApp = firebase.initializeApp(firebase.app().options, "Secondary_" + Date.now());

    const cred = await secondaryApp
      .auth()
      .createUserWithEmailAndPassword(email, senhaPadrao);

    await secondaryApp.auth().signOut();
    await secondaryApp.delete();

    await db.collection("usuarios").add({
      authUid: cred.user.uid,
      nome,
      nomeCompleto: nome,
      email,
      tipoUsuario: tipo,
      cargoNome: cargo || tipo,
      status: "ATIVO",
      acessoLiberado: true,
      clientePlataformaId: tenantId,
      clientePlataformaNome:
        usuarioLogado.clientePlataformaNome ||
        usuarioLogado.empresaNome ||
        "",
      criadoPorUid: usuarioLogado.authUid || "",
      criadoPorNome: usuarioLogado.nome || usuarioLogado.email || "",
      criadoEm: firebase.firestore.FieldValue.serverTimestamp()
    });

    await db.collection("logs").add({
      tipo: "CRIACAO_USUARIO",
      emailCriado: email,
      tipoUsuarioCriado: tipo,
      usuarioId: usuarioLogado.id,
      usuarioNome: usuarioLogado.nome || usuarioLogado.email || "",
      clientePlataformaId: tenantId,
      criadoEm: firebase.firestore.FieldValue.serverTimestamp()
    });

    alert(
      "Usuário criado com sucesso.\n\n" +
      "Email: " + email + "\n" +
      "Senha padrão: " + senhaPadrao
    );

    fecharDrawer();
    await carregarUsuarios();
    renderUsuarios();
    atualizarDashboard();

  } catch (e) {
    console.error(e);

    if (e.code === "auth/email-already-in-use") {
      alert("Este email já existe no Firebase Auth.");
      return;
    }

    alert("Erro ao criar usuário: " + (e.message || e.code));
  }
}

function abrirEditarUsuario(id) {
  const u = usuariosCache.find(x => x.id === id);
  if (!u) return;

  abrirDrawer("Editar usuário", `
    <input id="editNome" value="${u.nome || u.nomeCompleto || ""}">
    <input value="${u.email || ""}" disabled>

    <select id="editTipo">
      <option value="vendedor" ${u.tipoUsuario === "vendedor" ? "selected" : ""}>Vendedor</option>
      <option value="supervisor" ${u.tipoUsuario === "supervisor" ? "selected" : ""}>Supervisor</option>
      <option value="financeiro" ${u.tipoUsuario === "financeiro" ? "selected" : ""}>Financeiro</option>
      <option value="master_local" ${u.tipoUsuario === "master_local" ? "selected" : ""}>Master Local</option>
    </select>

    <input id="editCargo" value="${u.cargoNome || ""}">

    <select id="editStatus">
      <option value="ATIVO" ${u.status === "ATIVO" ? "selected" : ""}>ATIVO</option>
      <option value="INATIVO" ${u.status === "INATIVO" ? "selected" : ""}>INATIVO</option>
      <option value="BLOQUEADO" ${u.status === "BLOQUEADO" ? "selected" : ""}>BLOQUEADO</option>
    </select>

    <button class="btn btn-primary" onclick="salvarEdicaoUsuario('${u.id}')">Salvar</button>
  `);
}

async function salvarEdicaoUsuario(id) {
  try {
    const nome = document.getElementById("editNome").value.trim();
    const tipo = document.getElementById("editTipo").value;
    const cargo = document.getElementById("editCargo").value.trim();
    const status = document.getElementById("editStatus").value;

    await db.collection("usuarios").doc(id).update({
      nome,
      nomeCompleto: nome,
      tipoUsuario: tipo,
      cargoNome: cargo,
      status,
      atualizadoPorUid: usuarioLogado.authUid || "",
      atualizadoPorNome: usuarioLogado.nome || usuarioLogado.email || "",
      atualizadoEm: firebase.firestore.FieldValue.serverTimestamp()
    });

    alert("Dados alterados com sucesso.");

    fecharDrawer();
    await carregarUsuarios();
    renderUsuarios();

  } catch (e) {
    console.error(e);
    alert("Erro ao salvar edição.");
  }
}

async function alternarAcessoUsuario(id) {
  try {
    const u = usuariosCache.find(x => x.id === id);
    if (!u) return;

    const novoAcesso = u.acessoLiberado === false;

    await db.collection("usuarios").doc(id).update({
      acessoLiberado: novoAcesso,
      status: novoAcesso ? "ATIVO" : "BLOQUEADO",
      atualizadoEm: firebase.firestore.FieldValue.serverTimestamp()
    });

    await db.collection("logs").add({
      tipo: novoAcesso ? "LIBERAR_USUARIO" : "BLOQUEAR_USUARIO",
      usuarioAlvoId: id,
      usuarioAlvoEmail: u.email || "",
      usuarioId: usuarioLogado.id,
      usuarioNome: usuarioLogado.nome || usuarioLogado.email || "",
      clientePlataformaId: tenantId,
      criadoEm: firebase.firestore.FieldValue.serverTimestamp()
    });

    await carregarUsuarios();
    renderUsuarios();

    alert(novoAcesso ? "Usuário liberado." : "Usuário bloqueado.");

  } catch (e) {
    console.error(e);
    alert("Erro ao alterar acesso.");
  }
}

function renderClientes() {
  const html = clientesCache.length
    ? clientesCache.map(c => `
      <div class="card" style="margin-bottom:10px;">
        <strong>${c.nome || c.nomeCompleto || c.apelido || "Cliente sem nome"}</strong><br>
        <small>${c.telefone || c.telefonePrincipal || "-"}</small><br>
        <small>Saldo: ${moeda(c.saldoDevedor || c.saldo || 0)}</small>
      </div>
    `).join("")
    : "Nenhum cliente encontrado.";

  document.getElementById("listaClientes").innerHTML = html;
}

function renderSolicitacoes() {
  const el = document.getElementById("solicitacoes");
  if (!el) return;

  el.innerHTML = `
    <h3>Solicitações</h3>
    ${
      solicitacoesCache.length
        ? solicitacoesCache.map(s => `
          <div class="card" style="margin-bottom:10px;">
            <strong>${s.tipo || "Solicitação"}</strong><br>
            <small>Status: ${s.status || "PENDENTE"}</small><br>
            <small>Valor: ${moeda(s.valor || 0)}</small><br>
            <button class="btn btn-primary" onclick="aprovarSolicitacao('${s.id}')">Aprovar</button>
            <button class="btn btn-danger" onclick="recusarSolicitacao('${s.id}')">Recusar</button>
          </div>
        `).join("")
        : "Nenhuma solicitação encontrada."
    }
  `;
}

async function aprovarSolicitacao(id) {
  try {
    const s = solicitacoesCache.find(x => x.id === id);
    if (!s) return;

    await db.collection("solicitacoes").doc(id).update({
      status: "APROVADA",
      aprovadoPorUid: usuarioLogado.authUid || "",
      aprovadoPorNome: usuarioLogado.nome || usuarioLogado.email || "",
      aprovadoEm: firebase.firestore.FieldValue.serverTimestamp()
    });

    if (s.tipo === "INGRESSO" && s.caixaId) {
      const caixaRef = db.collection("caixas").doc(s.caixaId);
      const caixaSnap = await caixaRef.get();

      if (caixaSnap.exists) {
        const caixa = caixaSnap.data();
        const saldoAtual = Number(caixa.saldoAtual || caixa.valorAtual || caixa.saldo || 0);
        const novoSaldo = saldoAtual + Number(s.valor || 0);

        await caixaRef.update({
          saldoAtual: novoSaldo,
          atualizadoEm: firebase.firestore.FieldValue.serverTimestamp()
        });

        await db.collection("movcaixa").add({
          tipo: "ENTRADA",
          origem: "INGRESSO_APROVADO",
          valor: Number(s.valor || 0),
          caixaId: s.caixaId,
          solicitacaoId: id,
          clientePlataformaId: tenantId,
          criadoEm: firebase.firestore.FieldValue.serverTimestamp()
        });
      }
    }

    alert("Solicitação aprovada.");
    await carregarSolicitacoes();
    renderSolicitacoes();

  } catch (e) {
    console.error(e);
    alert("Erro ao aprovar solicitação.");
  }
}

async function recusarSolicitacao(id) {
  try {
    await db.collection("solicitacoes").doc(id).update({
      status: "RECUSADA",
      recusadoPorUid: usuarioLogado.authUid || "",
      recusadoPorNome: usuarioLogado.nome || usuarioLogado.email || "",
      recusadoEm: firebase.firestore.FieldValue.serverTimestamp()
    });

    alert("Solicitação recusada.");
    await carregarSolicitacoes();
    renderSolicitacoes();

  } catch (e) {
    console.error(e);
    alert("Erro ao recusar solicitação.");
  }
}

function logout() {
  firebase.auth().signOut().finally(() => {
    localStorage.removeItem("usuario");
    localStorage.removeItem("caixaAtual");
    window.location.href = "index.html";
  });
}

window.addEventListener("error", function(e) {
  console.error("ERRO JS:", e.message, "Linha:", e.lineno);
});
</script>

</body>
</html>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script src="js/firebase-config.js"></script>

<script>
let usuarioLogado = null;
let tenantId = "";

let usuariosCache = [];
let clientesCache = [];
let caixasCache = [];
let vendasCache = [];
let solicitacoesCache = [];

// INIT
document.addEventListener("DOMContentLoaded", async () => {
  usuarioLogado = JSON.parse(localStorage.getItem("usuario"));

  if (!usuarioLogado) {
    alert("Sessão expirada. Faça login novamente.");
    window.location.href = "index.html";
    return;
  }

  if (usuarioLogado.tipoUsuario !== "master_local") {
    alert("Acesso negado para este perfil.");
    window.location.href = "index.html";
    return;
  }

  tenantId =
    usuarioLogado.clientePlataformaId ||
    usuarioLogado.empresaId ||
    usuarioLogado.tenantId ||
    usuarioLogado.clienteId ||
    "";

  document.getElementById("userNome").innerText =
    usuarioLogado.nome || usuarioLogado.nomeCompleto || usuarioLogado.email || "Master Local";

  document.getElementById("empresaNome").innerText =
    usuarioLogado.clientePlataformaNome ||
    usuarioLogado.empresaNome ||
    usuarioLogado.nomeEmpresa ||
    "Empresa não identificada";

  await carregarTudo();
});

// HELPERS
function moeda(valor) {
  return Number(valor || 0).toLocaleString("pt-BR", {
    style: "currency",
    currency: "BRL"
  });
}

function badgeStatus(status) {
  const s = String(status || "").toUpperCase();

  if (s === "ATIVO" || s === "ATIVA" || s === "ABERTO" || s === "APROVADA") {
    return `<span class="badge b-green">${s}</span>`;
  }

  if (s === "BLOQUEADO" || s === "INATIVO" || s === "INATIVA" || s === "RECUSADA" || s === "FECHADO") {
    return `<span class="badge b-red">${s}</span>`;
  }

  if (s === "PENDENTE") {
    return `<span class="badge b-yellow">${s}</span>`;
  }

  return `<span class="badge b-gray">${s || "N/I"}</span>`;
}

// LOADERS
async function carregarTudo() {
  try {
    await Promise.all([
      carregarUsuarios(),
      carregarClientes(),
      carregarCaixas(),
      carregarVendas(),
      carregarSolicitacoes()
    ]);

    atualizarDashboard();
    renderUsuarios();
    renderClientes();
    renderCaixas();
    renderSolicitacoes();

  } catch (e) {
    console.error("Erro ao carregar dados:", e);
    alert("Erro ao carregar dados do Master Local.");
  }
}

async function carregarUsuarios() {
  let ref = db.collection("usuarios").limit(150);

  if (tenantId) {
    ref = db.collection("usuarios")
      .where("clientePlataformaId", "==", tenantId)
      .limit(150);
  }

  const snap = await ref.get();
  usuariosCache = [];

  snap.forEach(doc => {
    usuariosCache.push({ id: doc.id, ...doc.data() });

// DASHBOARD
function atualizarDashboard() {
  const carteira = clientesCache.reduce((total, c) => {
    return total + Number(c.saldoDevedor || c.saldo || 0);
  }, 0);

  const caixasAbertos = caixasCache.filter(c => {
    return String(c.status || "").toUpperCase() === "ABERTO";
  }).length;

  document.getElementById("kpiCarteira").innerText = moeda(carteira);
  document.getElementById("kpiClientes").innerText = clientesCache.length;
  document.getElementById("kpiUsuarios").innerText = usuariosCache.length;
  document.getElementById("kpiCaixas").innerText = caixasAbertos;
}

// NAVEGAÇÃO
function trocarTela(id, el) {
  const secao = document.getElementById(id);

  if (!secao) {
    alert("Tela não encontrada: " + id);
    return;
  }

  document.querySelectorAll("main section").forEach(section => {
    section.classList.add("hidden");
  });

  secao.classList.remove("hidden");

  document.querySelectorAll(".menu-item").forEach(item => {
    item.classList.remove("active");
  });

  if (el) {
    el.classList.add("active");
  } else {
    const menu = Array.from(document.querySelectorAll(".menu-item"))
      .find(item => item.getAttribute("onclick")?.includes("'" + id + "'"));
    if (menu) menu.classList.add("active");
  }

  const titulos = {
    dashboard: ["Dashboard", "Visão geral da empresa"],
    usuarios: ["Usuários", "Criação, edição, bloqueio e controle de acesso"],
    clientes: ["Clientes", "Consulta dos clientes da empresa"],
    caixas: ["Caixas", "Abertura, fechamento e acompanhamento dos caixas"],
    solicitacoes: ["Solicitações", "Aprovação ou recusa de ingressos e pedidos financeiros"]
  };

  if (titulos[id]) {
    document.getElementById("pageTitle").innerText = titulos[id][0];
    document.getElementById("pageSubtitle").innerText = titulos[id][1];
  }

  if (window.innerWidth <= 900) toggleMenu(false);
}

function toggleMenu(force) {
  const sidebar = document.getElementById("sidebar");
  const bg = document.getElementById("menuBg");

  if (force === false) {
    sidebar.classList.remove("open");
    bg.classList.remove("open");
    return;
  }

  sidebar.classList.toggle("open");
  bg.classList.toggle("open", sidebar.classList.contains("open"));
}

// DRAWER
function abrirDrawer(titulo, html) {
  document.getElementById("drawerTitle").innerText = titulo;
  document.getElementById("drawerContent").innerHTML = html;
  document.getElementById("drawerBg").classList.add("open");
  document.getElementById("drawer").classList.add("open");
}

function fecharDrawer() {
  document.getElementById("drawerBg").classList.remove("open");
  document.getElementById("drawer").classList.remove("open");
}
