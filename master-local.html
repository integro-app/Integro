<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ÍNTEGRO - Master Local</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">

  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:"Inter",sans-serif}

    body{
      background:#f4f7fb;
      display:flex;
      min-height:100vh;
    }

    /* SIDEBAR */
    .sidebar{
      width:260px;
      background:#071a33;
      color:#fff;
      padding:20px;
      position:fixed;
      height:100%;
      transition:.3s;
      z-index:100;
    }

    .sidebar.open{transform:translateX(0)}
    .sidebar.hide{transform:translateX(-100%)}

    .logo{
      font-size:22px;
      font-weight:900;
      margin-bottom:20px;
    }

    .menu-item{
      padding:12px;
      border-radius:10px;
      margin-bottom:8px;
      cursor:pointer;
      font-weight:700;
    }

    .menu-item:hover,
    .menu-item.active{
      background:linear-gradient(135deg,#ffb10033,#ff6b0033);
    }

    /* MAIN */
    .main{
      margin-left:260px;
      padding:20px;
      width:100%;
    }

    /* TOP */
    .top{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:20px;
    }

    .hamburger{
      display:none;
      font-size:22px;
      cursor:pointer;
    }

    /* BUTTONS */
    .btn{
      padding:10px 14px;
      border:none;
      border-radius:8px;
      font-weight:700;
      cursor:pointer;
    }

    .btn-primary{
      background:linear-gradient(135deg,#ffb100,#ff6b00);
      color:#fff;
    }

    .btn-ghost{
      background:#fff;
      border:1px solid #ddd;
    }

    .btn-danger{
      background:#ef4444;
      color:#fff;
    }

    /* CARDS */
    .cards{
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:12px;
      margin-bottom:20px;
    }

    .card{
      background:#fff;
      padding:18px;
      border-radius:14px;
      font-weight:800;
      box-shadow:0 10px 20px rgba(0,0,0,0.05);
    }

    /* LIST */
    .list{
      display:grid;
      gap:10px;
    }

    .item{
      background:#fff;
      padding:14px;
      border-radius:10px;
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    /* DRAWER */
    .drawer-bg{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,0.5);
      display:none;
      z-index:200;
    }

    .drawer{
      position:fixed;
      right:0;
      top:0;
      width:400px;
      height:100%;
      background:#fff;
      padding:20px;
      transform:translateX(100%);
      transition:.3s;
      z-index:300;
    }

    .drawer.open{transform:translateX(0)}
    .drawer-bg.open{display:block}

    input,select{
      width:100%;
      padding:10px;
      margin-bottom:10px;
      border-radius:8px;
      border:1px solid #ccc;
    }

    /* MOBILE */
    @media(max-width:900px){
      .sidebar{transform:translateX(-100%)}
      .main{margin-left:0}
      .hamburger{display:block}
      .cards{grid-template-columns:1fr 1fr}
    }

    @media(max-width:600px){
      .cards{grid-template-columns:1fr}
    }
  </style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar hide" id="sidebar">

  <div class="logo">ÍNTEGRO</div>

  <div class="menu-item active" onclick="trocarTela('dashboard')">Dashboard</div>
  <div class="menu-item" onclick="trocarTela('usuarios')">Usuários</div>
  <div class="menu-item" onclick="trocarTela('clientes')">Clientes</div>
  <div class="menu-item" onclick="trocarTela('cargos')">Cargos</div>
  <div class="menu-item" onclick="trocarTela('equipes')">Equipes</div>
  <div class="menu-item" onclick="trocarTela('caixa')">Caixa</div>
  <div class="menu-item" onclick="trocarTela('logs')">Auditoria</div>

  <div class="menu-item" onclick="logout()">Sair</div>

</div>

<!-- MAIN -->
<div class="main">

  <div class="top">
    <div>
      <span class="hamburger" onclick="toggleMenu()">☰</span>
      <h2 id="titulo">Dashboard</h2>
    </div>

    <button class="btn btn-primary" onclick="abrirNovoUsuario()">Novo usuário</button>
  </div>

  <!-- DASHBOARD -->
  <div id="dashboard">

    <div class="cards">
      <div class="card">Carteira: <span id="kpiCarteira">0</span></div>
      <div class="card">Clientes: <span id="kpiClientes">0</span></div>
      <div class="card">Usuários: <span id="kpiUsuarios">0</span></div>
      <div class="card">Caixas: <span id="kpiCaixas">0</span></div>
    </div>

  </div>

  <!-- USUARIOS -->
  <div id="usuarios" style="display:none">
    <div id="listaUsuarios" class="list"></div>
  </div>

  <!-- CLIENTES -->
  <div id="clientes" style="display:none">
    <div id="listaClientes" class="list"></div>
  </div>

  <!-- CARGOS -->
  <div id="cargos" style="display:none">
    <div id="listaCargos" class="list"></div>
  </div>

  <!-- EQUIPES -->
  <div id="equipes" style="display:none">
    <div id="listaEquipes" class="list"></div>
  </div>

  <!-- CAIXA -->
  <div id="caixa" style="display:none">
    <div id="listaCaixas" class="list"></div>
  </div>

  <!-- LOGS -->
  <div id="logs" style="display:none">
    <div id="listaLogs" class="list"></div>
  </div>

</div>

<!-- DRAWER -->
<div class="drawer-bg" id="drawerBg" onclick="fecharDrawer()"></div>
<div class="drawer" id="drawer">
  <h3 id="drawerTitle"></h3>
  <div id="drawerContent"></div>
</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script src="js/firebase-config.js"></script>

<script>
let usuarioLogado = null;
let tenantId = "";

let usuariosCache = [];
let clientesCache = [];
let cargosCache = [];
let equipesCache = [];
let caixasCache = [];
let vendasCache = [];
let logsCache = [];

// ================= INIT =================
document.addEventListener("DOMContentLoaded", async () => {
  usuarioLogado = JSON.parse(localStorage.getItem("usuario"));

  if (!usuarioLogado) {
    alert("Sessão expirada. Faça login novamente.");
    window.location.href = "index.html";
    return;
  }

  if (usuarioLogado.tipoUsuario !== "master_local") {
    alert("Acesso negado para este perfil.");
    window.location.href = "index.html";
    return;
  }

  tenantId =
    usuarioLogado.clientePlataformaId ||
    usuarioLogado.empresaId ||
    usuarioLogado.tenantId ||
    usuarioLogado.clienteId ||
    "";

  await carregarTudo();
});

// ================= HELPERS =================
function moeda(valor) {
  return Number(valor || 0).toLocaleString("pt-BR", {
    style: "currency",
    currency: "BRL"
  });
}

function hojeISO() {
  return new Date().toISOString().split("T")[0];
}

function statusTxt(valor) {
  return String(valor || "").toUpperCase();
}

function gravarLog(tipo, dados = {}) {
  return db.collection("logs").add({
    tipo,
    ...dados,
    usuarioId: usuarioLogado?.id || "",
    usuarioNome: usuarioLogado?.nome || usuarioLogado?.email || "",
    clientePlataformaId: tenantId,
    criadoEm: firebase.firestore.FieldValue.serverTimestamp()
  });
}

// ================= CARREGAMENTO GERAL =================
async function carregarTudo() {
  try {
    await Promise.all([
      carregarUsuarios(),
      carregarClientes(),
      carregarCargos(),
      carregarEquipes(),
      carregarCaixas(),
      carregarVendas(),
      carregarLogs()
    ]);

    atualizarDashboard();

    renderUsuarios();
    renderClientes();
    renderCargos();
    renderEquipes();
    renderCaixas();
    renderLogs();

  } catch (erro) {
    console.error("Erro ao carregar dados:", erro);
    alert("Erro ao carregar dados do Master Local.");
  }
}

// ================= LOADERS FIREBASE =================
async function carregarUsuarios() {
  let ref = db.collection("usuarios").limit(200);

  if (tenantId) {
    ref = db.collection("usuarios")
      .where("clientePlataformaId", "==", tenantId)
      .limit(200);
  }

  const snap = await ref.get();
  usuariosCache = [];

  snap.forEach(doc => {
    usuariosCache.push({ id: doc.id, ...doc.data() });
  });
}

async function carregarClientes() {
  let ref = db.collection("clientes").limit(300);

  if (tenantId) {
    ref = db.collection("clientes")
      .where("clientePlataformaId", "==", tenantId)
      .limit(300);
  }

  const snap = await ref.get();
  clientesCache = [];

  snap.forEach(doc => {
    clientesCache.push({ id: doc.id, ...doc.data() });
  });
}

async function carregarCargos() {
  let ref = db.collection("cargos").limit(100);

  if (tenantId) {
    ref = db.collection("cargos")
      .where("clientePlataformaId", "==", tenantId)
      .limit(100);
  }

  const snap = await ref.get();
  cargosCache = [];

  snap.forEach(doc => {
    cargosCache.push({ id: doc.id, ...doc.data() });
  });
}

async function carregarEquipes() {
  let ref = db.collection("equipes").limit(100);

  if (tenantId) {
    ref = db.collection("equipes")
      .where("clientePlataformaId", "==", tenantId)
      .limit(100);
  }

  const snap = await ref.get();
  equipesCache = [];

  snap.forEach(doc => {
    equipesCache.push({ id: doc.id, ...doc.data() });
  });
}

async function carregarCaixas() {
  let ref = db.collection("caixas").limit(200);

  if (tenantId) {
    ref = db.collection("caixas")
      .where("clientePlataformaId", "==", tenantId)
      .limit(200);
  }

  const snap = await ref.get();
  caixasCache = [];

  snap.forEach(doc => {
    caixasCache.push({ id: doc.id, ...doc.data() });
  });
}

async function carregarVendas() {
  let ref = db.collection("vendas").limit(300);

  if (tenantId) {
    ref = db.collection("vendas")
      .where("clientePlataformaId", "==", tenantId)
      .limit(300);
  }

  const snap = await ref.get();
  vendasCache = [];

  snap.forEach(doc => {
    vendasCache.push({ id: doc.id, ...doc.data() });
  });
}

async function carregarLogs() {
  let ref = db.collection("logs").limit(150);

  if (tenantId) {
    ref = db.collection("logs")
      .where("clientePlataformaId", "==", tenantId)
      .limit(150);
  }

  const snap = await ref.get();
  logsCache = [];

  snap.forEach(doc => {
    logsCache.push({ id: doc.id, ...doc.data() });
  });
}

// ================= DASHBOARD =================
function atualizarDashboard() {
  const carteira = clientesCache.reduce((total, c) => {
    return total + Number(c.saldoDevedor || c.saldo || 0);
  }, 0);

  const caixasAbertos = caixasCache.filter(c => {
    return statusTxt(c.status) === "ABERTO";
  }).length;

  document.getElementById("kpiCarteira").innerText = moeda(carteira);
  document.getElementById("kpiClientes").innerText = clientesCache.length;
  document.getElementById("kpiUsuarios").innerText = usuariosCache.length;
  document.getElementById("kpiCaixas").innerText = caixasAbertos;
}

// ================= NAVEGAÇÃO =================
function trocarTela(id) {
  const telas = [
    "dashboard",
    "usuarios",
    "clientes",
    "cargos",
    "equipes",
    "caixa",
    "logs"
  ];

  telas.forEach(tela => {
    const el = document.getElementById(tela);
    if (el) el.style.display = "none";
  });

  const atual = document.getElementById(id);
  if (atual) atual.style.display = "block";

  document.getElementById("titulo").innerText =
    id === "dashboard" ? "Dashboard" :
    id === "usuarios" ? "Usuários" :
    id === "clientes" ? "Clientes" :
    id === "cargos" ? "Cargos e permissões" :
    id === "equipes" ? "Equipes / Unidades" :
    id === "caixa" ? "Caixa" :
    id === "logs" ? "Auditoria" :
    "ÍNTEGRO";

  document.querySelectorAll(".menu-item").forEach(item => {
    item.classList.remove("active");
  });

  const menu = Array.from(document.querySelectorAll(".menu-item"))
    .find(item => item.getAttribute("onclick")?.includes("'" + id + "'"));

  if (menu) menu.classList.add("active");

  if (window.innerWidth <= 900) {
    toggleMenu(false);
  }
}

function toggleMenu(force) {
  const sidebar = document.getElementById("sidebar");

  if (force === false) {
    sidebar.classList.add("hide");
    sidebar.classList.remove("open");
    return;
  }

  if (sidebar.classList.contains("open")) {
    sidebar.classList.remove("open");
    sidebar.classList.add("hide");
  } else {
    sidebar.classList.add("open");
    sidebar.classList.remove("hide");
  }
}

// ================= DRAWER =================
function abrirDrawer(titulo, conteudo) {
  document.getElementById("drawerTitle").innerText = titulo;
  document.getElementById("drawerContent").innerHTML = conteudo;

  document.getElementById("drawer").classList.add("open");
  document.getElementById("drawerBg").classList.add("open");
}

function fecharDrawer() {
  document.getElementById("drawer").classList.remove("open");
  document.getElementById("drawerBg").classList.remove("open");
}

// ================= RENDER USUÁRIOS =================
function renderUsuarios() {
  const html = usuariosCache.length
    ? usuariosCache.map(u => `
      <div class="item">
        <div>
          <strong>${u.nome || u.nomeCompleto || "-"}</strong><br>
          <small>${u.email || "-"}</small><br>
          <small>Tipo: ${u.tipoUsuario || "-"} • Status: ${u.status || "-"}</small>
        </div>

        <div>
          <button class="btn btn-ghost" onclick="abrirEditarUsuario('${u.id}')">Editar</button>
          <button class="btn btn-danger" onclick="alternarAcessoUsuario('${u.id}')">
            ${u.acessoLiberado === false ? "Liberar" : "Bloquear"}
          </button>
        </div>
      </div>
    `).join("")
    : "Nenhum usuário encontrado.";

  document.getElementById("listaUsuarios").innerHTML = html;
}

// ================= NOVO USUÁRIO =================
function abrirNovoUsuario() {
  const cargosOptions = cargosCache.length
    ? cargosCache.map(c => `<option value="${c.id}">${c.nome || c.cargoNome || "Cargo"}</option>`).join("")
    : `<option value="">Sem cargos cadastrados</option>`;

  const equipesOptions = equipesCache.length
    ? equipesCache.map(e => `<option value="${e.id}">${e.nome || "Equipe"}</option>`).join("")
    : `<option value="">Sem equipe</option>`;

  abrirDrawer("Novo usuário", `
    <input id="novoNome" placeholder="Nome completo">

    <input id="novoEmail" type="email" placeholder="Email">

    <select id="novoTipo">
      <option value="vendedor">Vendedor</option>
      <option value="supervisor">Supervisor</option>
      <option value="financeiro">Financeiro</option>
      <option value="master_local">Master Local</option>
    </select>

    <select id="novoCargoId">
      ${cargosOptions}
    </select>

    <select id="novoEquipeId">
      ${equipesOptions}
    </select>

    <button class="btn btn-primary" onclick="salvarNovoUsuario()">Criar usuário</button>

    <p style="font-size:12px;color:#64748b;margin-top:10px;">
      Senha padrão: <strong>123456</strong>
    </p>
  `);
}

async function salvarNovoUsuario() {
  try {
    const nome = document.getElementById("novoNome").value.trim();
    const email = document.getElementById("novoEmail").value.trim();
    const tipo = document.getElementById("novoTipo").value;
    const cargoId = document.getElementById("novoCargoId").value;
    const equipeId = document.getElementById("novoEquipeId").value;

    if (!nome || !email) {
      alert("Informe nome e email.");
      return;
    }

    const cargo = cargosCache.find(c => c.id === cargoId);
    const equipe = equipesCache.find(e => e.id === equipeId);

    const senhaPadrao = "123456";

    const secondaryApp = firebase.initializeApp(firebase.app().options, "secondary_" + Date.now());

    const cred = await secondaryApp
      .auth()
      .createUserWithEmailAndPassword(email, senhaPadrao);

    await secondaryApp.auth().signOut();
    await secondaryApp.delete();

    await db.collection("usuarios").add({
      authUid: cred.user.uid,
      nome,
      nomeCompleto: nome,
      email,
      tipoUsuario: tipo,

      cargoId: cargoId || "",
      cargoNome: cargo?.nome || cargo?.cargoNome || tipo,
      permissoes: cargo?.permissoes || {},

      equipeId: equipeId || "",
      equipeNome: equipe?.nome || "",

      status: "ATIVO",
      acessoLiberado: true,

      clientePlataformaId: tenantId,
      clientePlataformaNome:
        usuarioLogado.clientePlataformaNome ||
        usuarioLogado.empresaNome ||
        "",

      criadoPorUid: usuarioLogado.authUid || "",
      criadoPorNome: usuarioLogado.nome || usuarioLogado.email || "",
      criadoEm: firebase.firestore.FieldValue.serverTimestamp()
    });

    await gravarLog("CRIACAO_USUARIO", {
      emailCriado: email,
      nomeCriado: nome,
      tipoUsuarioCriado: tipo
    });

    alert(
      "Usuário criado com sucesso.\n\n" +
      "Email: " + email + "\n" +
      "Senha: " + senhaPadrao
    );

    fecharDrawer();
    await carregarTudo();

  } catch (e) {
    console.error("Erro criar usuário:", e);

    if (e.code === "auth/email-already-in-use") {
      alert("Este email já existe no Firebase Auth.");
      return;
    }

    alert("Erro ao criar usuário: " + (e.message || e.code));
  }
}

// ================= EDITAR / BLOQUEAR USUÁRIO =================
function abrirEditarUsuario(id) {
  const u = usuariosCache.find(x => x.id === id);
  if (!u) return;

  const cargosOptions = cargosCache.length
    ? cargosCache.map(c => `
      <option value="${c.id}" ${u.cargoId === c.id ? "selected" : ""}>
        ${c.nome || c.cargoNome || "Cargo"}
      </option>
    `).join("")
    : `<option value="">Sem cargos cadastrados</option>`;

  const equipesOptions = equipesCache.length
    ? equipesCache.map(e => `
      <option value="${e.id}" ${u.equipeId === e.id ? "selected" : ""}>
        ${e.nome || "Equipe"}
      </option>
    `).join("")
    : `<option value="">Sem equipe</option>`;

  abrirDrawer("Editar usuário", `
    <input id="editNome" value="${u.nome || u.nomeCompleto || ""}">
    <input value="${u.email || ""}" disabled>

    <select id="editTipo">
      <option value="vendedor" ${u.tipoUsuario === "vendedor" ? "selected" : ""}>Vendedor</option>
      <option value="supervisor" ${u.tipoUsuario === "supervisor" ? "selected" : ""}>Supervisor</option>
      <option value="financeiro" ${u.tipoUsuario === "financeiro" ? "selected" : ""}>Financeiro</option>
      <option value="master_local" ${u.tipoUsuario === "master_local" ? "selected" : ""}>Master Local</option>
    </select>

    <select id="editCargoId">${cargosOptions}</select>

    <select id="editEquipeId">${equipesOptions}</select>

    <select id="editStatus">
      <option value="ATIVO" ${u.status === "ATIVO" ? "selected" : ""}>ATIVO</option>
      <option value="INATIVO" ${u.status === "INATIVO" ? "selected" : ""}>INATIVO</option>
      <option value="BLOQUEADO" ${u.status === "BLOQUEADO" ? "selected" : ""}>BLOQUEADO</option>
    </select>

    <button class="btn btn-primary" onclick="salvarEdicaoUsuario('${u.id}')">Salvar alterações</button>
  `);
}

async function salvarEdicaoUsuario(id) {
  try {
    const nome = document.getElementById("editNome").value.trim();
    const tipo = document.getElementById("editTipo").value;
    const cargoId = document.getElementById("editCargoId").value;
    const equipeId = document.getElementById("editEquipeId").value;
    const status = document.getElementById("editStatus").value;

    const cargo = cargosCache.find(c => c.id === cargoId);
    const equipe = equipesCache.find(e => e.id === equipeId);

    await db.collection("usuarios").doc(id).update({
      nome,
      nomeCompleto: nome,
      tipoUsuario: tipo,
      cargoId: cargoId || "",
      cargoNome: cargo?.nome || cargo?.cargoNome || tipo,
      permissoes: cargo?.permissoes || {},
      equipeId: equipeId || "",
      equipeNome: equipe?.nome || "",
      status,
      acessoLiberado: status !== "BLOQUEADO",
      atualizadoPorUid: usuarioLogado.authUid || "",
      atualizadoPorNome: usuarioLogado.nome || usuarioLogado.email || "",
      atualizadoEm: firebase.firestore.FieldValue.serverTimestamp()
    });

    await gravarLog("EDICAO_USUARIO", {
      usuarioEditadoId: id,
      nomeEditado: nome,
      tipoEditado: tipo
    });

    alert("Usuário atualizado com sucesso.");

    fecharDrawer();
    await carregarTudo();

  } catch (e) {
    console.error("Erro editar usuário:", e);
    alert("Erro ao editar usuário.");
  }
}

async function alternarAcessoUsuario(id) {
  try {
    const u = usuariosCache.find(x => x.id === id);
    if (!u) return;

    const novoAcesso = u.acessoLiberado === false;

    await db.collection("usuarios").doc(id).update({
      acessoLiberado: novoAcesso,
      status: novoAcesso ? "ATIVO" : "BLOQUEADO",
      atualizadoEm: firebase.firestore.FieldValue.serverTimestamp()
    });

    await gravarLog(novoAcesso ? "LIBERAR_USUARIO" : "BLOQUEAR_USUARIO", {
      usuarioAlvoId: id,
      usuarioAlvoEmail: u.email || ""
    });

    alert(novoAcesso ? "Usuário liberado." : "Usuário bloqueado.");

    await carregarTudo();

  } catch (e) {
    console.error("Erro acesso usuário:", e);
    alert("Erro ao alterar acesso.");
  }
}

// ================= RENDER CLIENTES =================
function renderClientes() {
  const html = clientesCache.length
    ? clientesCache.map(c => `
      <div class="item">
        <div>
          <strong>${c.nome || c.nomeCompleto || c.apelido || "Cliente sem nome"}</strong><br>
          <small>${c.telefone || c.telefonePrincipal || "-"}</small><br>
          <small>Saldo: ${moeda(c.saldoDevedor || c.saldo || 0)}</small>
        </div>
        <div>
          <button class="btn btn-ghost" onclick="abrirCliente('${c.id}')">Ver</button>
        </div>
      </div>
    `).join("")
    : "Nenhum cliente encontrado.";

  document.getElementById("listaClientes").innerHTML = html;
}

function abrirCliente(id) {
  const c = clientesCache.find(x => x.id === id);
  if (!c) return;

  abrirDrawer("Cliente", `
    <p><strong>Nome:</strong> ${c.nome || c.nomeCompleto || "-"}</p>
    <p><strong>Apelido:</strong> ${c.apelido || "-"}</p>
    <p><strong>Telefone:</strong> ${c.telefone || c.telefonePrincipal || "-"}</p>
    <p><strong>Documento:</strong> ${c.documento || "-"}</p>
    <p><strong>Saldo:</strong> ${moeda(c.saldoDevedor || c.saldo || 0)}</p>
    <p><strong>Status:</strong> ${c.status || "-"}</p>
  `);
}
