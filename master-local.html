<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ÍNTEGRO • Master Local</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Inter',sans-serif;
    }
    :root{
      --bg:#f4f7fb;
      --surface:#ffffff;
      --surface2:#f8fafc;
      --panel:#071a33;
      --panel2:#0c2344;
      --line:#e2e8f0;
      --text:#0f172a;
      --muted:#64748b;
      --orange1:#ffb100;
      --orange2:#ff6b00;
      --green:#22c55e;
      --red:#ef4444;
      --blue:#0ea5e9;
      --purple:#7c3aed;
      --shadow:0 15px 35px rgba(15,23,42,.08);
    }
    body{
      background:var(--bg);
      overflow-x:hidden;
      min-height:100vh;
    }
    button{
      border:none;
      cursor:pointer;
      font-family:inherit;
      transition:.2s;
    }
    input,
    select,
    textarea{
      width:100%;
      border:1px solid var(--line);
      background:#fff;
      border-radius:14px;
      padding:14px;
      outline:none;
      font-weight:700;
      color:var(--text);
    }
    textarea{
      min-height:120px;
      resize:none;
    }
    .hidden{
      display:none!important;
    }
    #menuOverlay{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,.45);
      z-index:90;
      display:none;
    }
    #menuOverlay.open{
      display:block;
    }
    .sidebar{
      width:290px;
      height:100vh;
      position:fixed;
      left:0;
      top:0;
      background:linear-gradient(180deg,var(--panel),var(--panel2));
      color:#fff;
      z-index:100;
      overflow-y:auto;
      padding:22px;
      transition:.3s;
    }
    .logo{
      font-size:29px;
      font-weight:900;
      letter-spacing:-1px;
      margin-bottom:25px;
    }
    .user-card{
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.08);
      border-radius:22px;
      padding:18px;
      margin-bottom:22px;
    }
    .user-card small{
      display:block;
      color:#cbd5e1;
      margin-bottom:5px;
      font-weight:700;
    }
    .user-card strong{
      display:block;
      font-size:15px;
      margin-bottom:6px;
    }
    .master-badge{
      display:inline-flex;
      padding:7px 12px;
      border-radius:999px;
      background:linear-gradient(135deg,#ffb10055,#ff6b0030);
      font-size:11px;
      font-weight:900;
    }
    .menu-title{
      font-size:11px;
      text-transform:uppercase;
      color:#94a3b8;
      margin:18px 0 10px;
      font-weight:900;
      letter-spacing:.5px;
    }
    .menu-item{
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:14px;
      border-radius:16px;
      margin-bottom:8px;
      cursor:pointer;
      transition:.2s;
      font-weight:800;
      color:#dbeafe;
    }
    .menu-item:hover,
    .menu-item.active{
      background:linear-gradient(135deg,#ffb10033,#ff6b0018);
      color:#fff;
    }
    .main{
      margin-left:290px;
      padding:24px;
      transition:.3s;
    }
    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:18px;
      margin-bottom:22px;
    }
    .top-left{
      display:flex;
      gap:14px;
      align-items:flex-start;
    }
    .mobile-menu-btn{
      width:48px;
      height:48px;
      border-radius:16px;
      background:#fff;
      display:none;
      align-items:center;
      justify-content:center;
      box-shadow:var(--shadow);
      font-size:22px;
      font-weight:900;
    }
    .topbar h1{
      font-size:30px;
      font-weight:900;
      letter-spacing:-1px;
      color:var(--text);
    }
    .topbar p{
      margin-top:5px;
      color:var(--muted);
      font-weight:700;
    }
    .top-actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }
