<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ÍNTEGRO - Master Local</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">

  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:"Inter",sans-serif}

    body{
      background:#f4f7fb;
      display:flex;
      min-height:100vh;
    }

    /* SIDEBAR */
    .sidebar{
      width:260px;
      background:#071a33;
      color:#fff;
      padding:20px;
      position:fixed;
      height:100%;
      transition:.3s;
      z-index:100;
    }

    .sidebar.open{transform:translateX(0)}
    .sidebar.hide{transform:translateX(-100%)}

    .logo{
      font-size:22px;
      font-weight:900;
      margin-bottom:20px;
    }

    .menu-item{
      padding:12px;
      border-radius:10px;
      margin-bottom:8px;
      cursor:pointer;
      font-weight:700;
    }

    .menu-item:hover,
    .menu-item.active{
      background:linear-gradient(135deg,#ffb10033,#ff6b0033);
    }

    /* MAIN */
    .main{
      margin-left:260px;
      padding:20px;
      width:100%;
    }

    /* TOP */
    .top{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:20px;
    }

    .hamburger{
      display:none;
      font-size:22px;
      cursor:pointer;
    }

    /* BUTTONS */
    .btn{
      padding:10px 14px;
      border:none;
      border-radius:8px;
      font-weight:700;
      cursor:pointer;
    }

    .btn-primary{
      background:linear-gradient(135deg,#ffb100,#ff6b00);
      color:#fff;
    }

    .btn-ghost{
      background:#fff;
      border:1px solid #ddd;
    }

    .btn-danger{
      background:#ef4444;
      color:#fff;
    }

    /* CARDS */
    .cards{
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:12px;
      margin-bottom:20px;
    }

    .card{
      background:#fff;
      padding:18px;
      border-radius:14px;
      font-weight:800;
      box-shadow:0 10px 20px rgba(0,0,0,0.05);
    }

    /* LIST */
    .list{
      display:grid;
      gap:10px;
    }

    .item{
      background:#fff;
      padding:14px;
      border-radius:10px;
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    /* DRAWER */
    .drawer-bg{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,0.5);
      display:none;
      z-index:200;
    }

    .drawer{
      position:fixed;
      right:0;
      top:0;
      width:400px;
      height:100%;
      background:#fff;
      padding:20px;
      transform:translateX(100%);
      transition:.3s;
      z-index:300;
    }

    .drawer.open{transform:translateX(0)}
    .drawer-bg.open{display:block}

    input,select{
      width:100%;
      padding:10px;
      margin-bottom:10px;
      border-radius:8px;
      border:1px solid #ccc;
    }

    /* MOBILE */
    @media(max-width:900px){
      .sidebar{transform:translateX(-100%)}
      .main{margin-left:0}
      .hamburger{display:block}
      .cards{grid-template-columns:1fr 1fr}
    }

    @media(max-width:600px){
      .cards{grid-template-columns:1fr}
    }
  </style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar hide" id="sidebar">

  <div class="logo">ÍNTEGRO</div>

  <div class="menu-item active" onclick="trocarTela('dashboard')">Dashboard</div>
  <div class="menu-item" onclick="trocarTela('usuarios')">Usuários</div>
  <div class="menu-item" onclick="trocarTela('clientes')">Clientes</div>
  <div class="menu-item" onclick="trocarTela('cargos')">Cargos</div>
  <div class="menu-item" onclick="trocarTela('equipes')">Equipes</div>
  <div class="menu-item" onclick="trocarTela('caixa')">Caixa</div>
  <div class="menu-item" onclick="trocarTela('logs')">Auditoria</div>

  <div class="menu-item" onclick="logout()">Sair</div>

</div>

<!-- MAIN -->
<div class="main">

  <div class="top">
    <div>
      <span class="hamburger" onclick="toggleMenu()">☰</span>
      <h2 id="titulo">Dashboard</h2>
    </div>

    <button class="btn btn-primary" onclick="abrirNovoUsuario()">Novo usuário</button>
  </div>

  <!-- DASHBOARD -->
  <div id="dashboard">

    <div class="cards">
      <div class="card">Carteira: <span id="kpiCarteira">0</span></div>
      <div class="card">Clientes: <span id="kpiClientes">0</span></div>
      <div class="card">Usuários: <span id="kpiUsuarios">0</span></div>
      <div class="card">Caixas: <span id="kpiCaixas">0</span></div>
    </div>

  </div>

  <!-- USUARIOS -->
  <div id="usuarios" style="display:none">
    <div id="listaUsuarios" class="list"></div>
  </div>

  <!-- CLIENTES -->
  <div id="clientes" style="display:none">
    <div id="listaClientes" class="list"></div>
  </div>

  <!-- CARGOS -->
  <div id="cargos" style="display:none">
    <div id="listaCargos" class="list"></div>
  </div>

  <!-- EQUIPES -->
  <div id="equipes" style="display:none">
    <div id="listaEquipes" class="list"></div>
  </div>

  <!-- CAIXA -->
  <div id="caixa" style="display:none">
    <div id="listaCaixas" class="list"></div>
  </div>

  <!-- LOGS -->
  <div id="logs" style="display:none">
    <div id="listaLogs" class="list"></div>
  </div>

</div>

<!-- DRAWER -->
<div class="drawer-bg" id="drawerBg" onclick="fecharDrawer()"></div>
<div class="drawer" id="drawer">
  <h3 id="drawerTitle"></h3>
  <div id="drawerContent"></div>
</div>
