<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ÍNTEGRO • Master Local</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Inter',sans-serif;
    }
    :root{
      --bg:#f4f7fb;
      --surface:#ffffff;
      --surface2:#f8fafc;
      --panel:#071a33;
      --panel2:#0c2344;
      --line:#e2e8f0;
      --text:#0f172a;
      --muted:#64748b;
      --orange1:#ffb100;
      --orange2:#ff6b00;
      --green:#22c55e;
      --red:#ef4444;
      --blue:#0ea5e9;
      --purple:#7c3aed;
      --shadow:0 15px 35px rgba(15,23,42,.08);
    }
    body{
      background:var(--bg);
      overflow-x:hidden;
      min-height:100vh;
    }
    button{
      border:none;
      cursor:pointer;
      font-family:inherit;
      transition:.2s;
    }
    input,
    select,
    textarea{
      width:100%;
      border:1px solid var(--line);
      background:#fff;
      border-radius:14px;
      padding:14px;
      outline:none;
      font-weight:700;
      color:var(--text);
    }
    textarea{
      min-height:120px;
      resize:none;
    }
    .hidden{
      display:none!important;
    }
    #menuOverlay{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,.45);
      z-index:90;
      display:none;
    }
    #menuOverlay.open{
      display:block;
    }
    .sidebar{
      width:290px;
      height:100vh;
      position:fixed;
      left:0;
      top:0;
      background:linear-gradient(180deg,var(--panel),var(--panel2));
      color:#fff;
      z-index:100;
      overflow-y:auto;
      padding:22px;
      transition:.3s;
    }
    .logo{
      font-size:29px;
      font-weight:900;
      letter-spacing:-1px;
      margin-bottom:25px;
    }
    .user-card{
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.08);
      border-radius:22px;
      padding:18px;
      margin-bottom:22px;
    }
    .user-card small{
      display:block;
      color:#cbd5e1;
      margin-bottom:5px;
      font-weight:700;
    }
    .user-card strong{
      display:block;
      font-size:15px;
      margin-bottom:6px;
    }
    .master-badge{
      display:inline-flex;
      padding:7px 12px;
      border-radius:999px;
      background:linear-gradient(135deg,#ffb10055,#ff6b0030);
      font-size:11px;
      font-weight:900;
    }
    .menu-title{
      font-size:11px;
      text-transform:uppercase;
      color:#94a3b8;
      margin:18px 0 10px;
      font-weight:900;
      letter-spacing:.5px;
    }
    .menu-item{
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:14px;
      border-radius:16px;
      margin-bottom:8px;
      cursor:pointer;
      transition:.2s;
      font-weight:800;
      color:#dbeafe;
    }
    .menu-item:hover,
    .menu-item.active{
      background:linear-gradient(135deg,#ffb10033,#ff6b0018);
      color:#fff;
    }
    .main{
      margin-left:290px;
      padding:24px;
      transition:.3s;
    }
    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:18px;
      margin-bottom:22px;
    }
    .top-left{
      display:flex;
      gap:14px;
      align-items:flex-start;
    }
    .mobile-menu-btn{
      width:48px;
      height:48px;
      border-radius:16px;
      background:#fff;
      display:none;
      align-items:center;
      justify-content:center;
      box-shadow:var(--shadow);
      font-size:22px;
      font-weight:900;
    }
    .topbar h1{
      font-size:30px;
      font-weight:900;
      letter-spacing:-1px;
      color:var(--text);
    }
    .topbar p{
      margin-top:5px;
      color:var(--muted);
      font-weight:700;
    }
    .top-actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

Cole logo abaixo da parte 1:

    .primary-btn{
      padding:13px 18px;
      border-radius:14px;
      color:#fff;
      background:linear-gradient(135deg,var(--orange1),var(--orange2));
      box-shadow:0 12px 24px rgba(255,107,0,.24);
      font-weight:900;
    }
    .ghost-btn{
      padding:13px 18px;
      border-radius:14px;
      background:#fff;
      border:1px solid var(--line);
      color:var(--text);
      font-weight:800;
    }
    .danger-btn{
      padding:12px 16px;
      border-radius:12px;
      color:#fff;
      background:linear-gradient(135deg,#ef4444,#991b1b);
      font-weight:900;
    }
    .success-btn{
      padding:12px 16px;
      border-radius:12px;
      color:#fff;
      background:linear-gradient(135deg,#22c55e,#166534);
      font-weight:900;
    }
    .cards{
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:16px;
      margin-bottom:18px;
    }
    .card{
      border-radius:26px;
      padding:24px;
      color:#fff;
      min-height:135px;
      position:relative;
      overflow:hidden;
      box-shadow:var(--shadow);
    }
    .card::after{
      content:"";
      position:absolute;
      width:170px;
      height:170px;
      border-radius:50%;
      background:rgba(255,255,255,.10);
      right:-55px;
      bottom:-65px;
    }
    .card small{
      display:block;
      margin-bottom:16px;
      font-weight:900;
      opacity:.95;
    }
    .card strong{
      font-size:30px;
      font-weight:900;
      letter-spacing:-1px;
    }
    .orange{background:linear-gradient(135deg,#ffb100,#ff6b00);}
    .blue{background:linear-gradient(135deg,#00c6ff,#0072ff);}
    .green{background:linear-gradient(135deg,#22c55e,#15803d);}
    .purple{background:linear-gradient(135deg,#8b5cf6,#5b21b6);}
    .panel{
      background:#fff;
      border-radius:24px;
      padding:22px;
      border:1px solid var(--line);
      box-shadow:0 10px 30px rgba(15,23,42,.05);
    }
    .panel-title{
      font-size:18px;
      font-weight:900;
      margin-bottom:16px;
      color:var(--text);
    }
    .list{
      display:grid;
      gap:12px;
    }
    .list-item{
      background:#fff;
      border:1px solid var(--line);
      border-radius:18px;
      padding:16px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:14px;
    }
    .list-item strong{
      display:block;
      margin-bottom:4px;
      font-size:14px;
    }
    .list-item small{
      display:block;
      color:var(--muted);
      line-height:1.5;
      font-weight:700;
    }
    .item-actions{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
    }
    .drawerOverlay{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,.45);
      z-index:150;
      display:none;
    }
    .drawerOverlay.open{
      display:block;
    }
    .drawer{
      position:fixed;
      right:0;
      top:0;
      width:500px;
      max-width:100%;
      height:100vh;
      background:#fff;
      z-index:200;
      overflow-y:auto;
      padding:24px;
      transform:translateX(100%);
      transition:.3s;
      box-shadow:-20px 0 50px rgba(0,0,0,.18);
    }
    .drawer.open{
      transform:translateX(0);
    }
    .drawer h2{
      font-size:25px;
      font-weight:900;
      margin-bottom:18px;
      color:var(--text);
    }
    @media(max-width:1000px){
      .sidebar{
        transform:translateX(-100%);
      }
      .sidebar.open{
        transform:translateX(0);
      }
      .main{
        margin-left:0;
      }
      .mobile-menu-btn{
        display:flex;
      }
      .cards{
        grid-template-columns:1fr 1fr;
      }
      #dashboardGrid{
        grid-template-columns:1fr!important;
      }
    }
    @media(max-width:700px){
      .main{
        padding:16px;
      }
      .cards{
        grid-template-columns:1fr;
      }
      .topbar{
        flex-direction:column;
      }
      .top-actions{
        width:100%;
        flex-direction:column;
      }
      .top-actions button{
        width:100%;
      }
      .list-item{
        flex-direction:column;
        align-items:flex-start;
      }
      .item-actions{
        width:100%;
      }
      .item-actions button{
        width:100%;
      }
      .card{
        min-height:115px;
        padding:20px;
      }
      .card strong{
        font-size:25px;
      }
      .panel{
        padding:18px;
      }
    }
  </style>
</head>
