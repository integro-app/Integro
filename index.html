<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ÍNTEGRO</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }

    body {
      display: flex;
      height: 100vh;
      background: #f5f7fb;
    }

    /* SIDEBAR */
    .sidebar {
      width: 240px;
      background: #071a33;
      color: white;
      padding: 20px;
    }

    .logo {
      font-size: 22px;
      font-weight: 800;
      margin-bottom: 30px;
    }

    .menu-item {
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 10px;
      cursor: pointer;
    }

    .menu-item:hover {
      background: rgba(255,255,255,0.1);
    }

    /* MAIN */
    .main {
      flex: 1;
      padding: 20px;
    }

    /* LOGIN */
    .login-box {
      max-width: 400px;
      margin: 100px auto;
      background: white;
      padding: 30px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }

    .login-box h2 {
      margin-bottom: 20px;
    }

    .input {
      width: 100%;
      padding: 12px;
      margin-bottom: 12px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    .btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      background: linear-gradient(135deg, #ffb100, #ff6b00);
      color: white;
      font-weight: 600;
      cursor: pointer;
    }

    .btn:hover {
      opacity: 0.9;
    }

  </style>
</head>

<body>

  <!-- MENU -->
  <div class="sidebar">
    <div class="logo">ÍNTEGRO</div>

    <div class="menu-item">Dashboard</div>
    <div class="menu-item">Clientes</div>
    <div class="menu-item">Vendas</div>
    <div class="menu-item">Cobranças</div>
    <div class="menu-item">Financeiro</div>
  </div>

  <!-- CONTEÚDO -->
  <div class="main">

    <div class="login-box">
      <h2>Login ÍNTEGRO</h2>

      <input id="email" class="input" type="email" placeholder="Email">
      <input id="senha" class="input" type="password" placeholder="Senha">

      <button class="btn" onclick="login()">Entrar</button>
    </div>

  </div>

  <!-- FIREBASE -->
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

  <script src="js/firebase-config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
