<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ÍNTEGRO • Login</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link href="css/integro-theme.css" rel="stylesheet">

  <style>
    :root{
      --nav-950:#020617;
      --nav-900:#061426;
      --nav-800:#071a33;
      --nav-700:#092b61;
      --text:#f8fafc;
      --muted:#94a3b8;
      --muted-2:#cbd5e1;
      --line:rgba(226,232,240,.18);
      --orange:#ff7a00;
      --orange-2:#ffb100;
      --orange-3:#ff5f00;
      --input:#eef4ff;
      --input-text:#061426;
      --shadow:0 28px 80px rgba(0,0,0,.38);
    }

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:"Inter",sans-serif;
    }

    html,
    body{
      min-height:100%;
    }

    body{
      min-height:100vh;
      background:
        radial-gradient(circle at 12% 6%, rgba(255,122,0,.18), transparent 28%),
        radial-gradient(circle at 88% 72%, rgba(22,131,255,.23), transparent 34%),
        radial-gradient(circle at 62% 22%, rgba(14,165,233,.08), transparent 32%),
        linear-gradient(135deg,var(--nav-950) 0%,var(--nav-900) 46%,var(--nav-800) 100%);
      color:var(--text);
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
      overflow:hidden;
      position:relative;
    }

    body::before{
      content:"";
      position:absolute;
      inset:0;
      background-image:
        linear-gradient(rgba(255,255,255,.024) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.024) 1px, transparent 1px);
      background-size:42px 42px;
      opacity:.55;
      pointer-events:none;
    }

    body::after{
      content:"";
      position:absolute;
      width:760px;
      height:760px;
      border:1px solid rgba(255,255,255,.045);
      border-radius:50%;
      right:-260px;
      top:76px;
      pointer-events:none;
    }

    .login-page{
      width:100%;
      max-width:392px;
      min-height:100vh;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:22px;
      position:relative;
      z-index:2;
    }

    .logo{
      width:100%;
      display:flex;
      align-items:center;
      justify-content:center;
      line-height:1;
      user-select:none;
    }

    /* Logo oficial em texto: ÍNTE branco + GRO laranja.
       Classes exclusivas para não sofrer conflito com css/integro-theme.css. */
    .integro-login-wordmark{
      display:inline-flex;
      align-items:baseline;
      gap:0;
      font-size:38px;
      font-weight:900;
      letter-spacing:-2.2px;
      line-height:1;
      text-shadow:0 14px 28px rgba(0,0,0,.32);
    }

    .integro-login-logo-white{
      color:#ffffff !important;
      -webkit-text-fill-color:#ffffff !important;
      background:none !important;
    }

    .integro-login-logo-orange{
      color:#ff7a00 !important;
      -webkit-text-fill-color:#ff7a00 !important;
      background:none !important;
    }

    .login-card{
      width:100%;
      max-width:390px;
      background:
        linear-gradient(180deg,rgba(255,255,255,.105),rgba(255,255,255,.042)),
        rgba(15,23,42,.50);
      border:1px solid rgba(226,232,240,.26);
      border-radius:26px;
      padding:32px 30px 28px;
      box-shadow:var(--shadow), inset 0 1px 0 rgba(255,255,255,.16);
      backdrop-filter:blur(22px);
      position:relative;
      overflow:hidden;
    }

    .login-card::before{
      content:"";
      position:absolute;
      inset:0 0 auto 0;
      height:1px;
      background:linear-gradient(90deg,transparent,rgba(255,177,0,.65),transparent);
    }


    label{
      display:block;
      font-size:11px;
      color:#dbeafe;
      font-weight:850;
      letter-spacing:.62px;
      margin-bottom:8px;
      text-transform:uppercase;
    }

    .input-wrap{
      position:relative;
      margin-bottom:18px;
    }

    .input-wrap svg{
      position:absolute;
      left:17px;
      top:50%;
      transform:translateY(-50%);
      width:19px;
      height:19px;
      color:#64748b;
      opacity:.72;
      pointer-events:none;
    }

    .input{
      width:100%;
      height:54px;
      border-radius:15px;
      border:1px solid rgba(226,232,240,.20);
      background:var(--input);
      color:var(--input-text);
      outline:none;
      padding:0 52px 0 50px;
      font-size:14px;
      font-weight:650;
      box-shadow:inset 0 1px 0 rgba(255,255,255,.65);
      transition:.2s ease;
    }

    .input::placeholder{
      color:rgba(15,23,42,.42);
      font-weight:600;
    }

    .input:focus{
      border-color:rgba(255,177,0,.78);
      background:#f8fafc;
      box-shadow:
        0 0 0 4px rgba(255,177,0,.13),
        inset 0 1px 0 rgba(255,255,255,.70);
    }

    .toggle-pass{
      position:absolute;
      right:15px;
      top:50%;
      transform:translateY(-50%);
      width:28px;
      height:28px;
      background:transparent;
      border:none;
      color:#94a3b8;
      cursor:pointer;
      display:flex;
      align-items:center;
      justify-content:center;
      border-radius:8px;
    }

    .toggle-pass:hover{
      background:rgba(15,23,42,.06);
      color:#475569;
    }

    .toggle-pass svg{
      position:static;
      transform:none;
      width:21px;
      height:21px;
    }

    .login-btn{
      width:100%;
      height:56px;
      border:none;
      border-radius:15px;
      background:linear-gradient(135deg,var(--orange-2) 0%,var(--orange) 48%,var(--orange-3) 100%);
      color:#fff;
      font-size:15px;
      font-weight:900;
      cursor:pointer;
      box-shadow:0 18px 34px rgba(255,107,0,.28), inset 0 1px 0 rgba(255,255,255,.28);
      transition:.2s ease;
      margin-top:4px;
    }

    .login-btn:hover{
      transform:translateY(-1px);
      filter:saturate(1.08);
    }

    .divider{
      display:flex;
      align-items:center;
      gap:15px;
      margin:24px 0 18px;
      color:#8798ad;
      font-size:12px;
      font-weight:800;
    }

    .divider::before,
    .divider::after{
      content:"";
      flex:1;
      height:1px;
      background:rgba(226,232,240,.18);
    }

    .forgot{
      text-align:center;
      color:#c7d8ee;
      font-size:13px;
      font-weight:700;
      text-decoration:underline;
      text-underline-offset:3px;
      cursor:pointer;
      transition:.2s;
    }

    .forgot:hover{
      color:var(--orange-2);
    }

    .status{
      display:none;
      margin-top:16px;
      padding:12px 13px;
      border-radius:13px;
      background:rgba(15,23,42,.34);
      border:1px solid rgba(226,232,240,.18);
      color:#dbeafe;
      font-size:13px;
      font-weight:700;
      line-height:1.45;
    }

    .status.show{
      display:block;
    }

    @media(max-width:760px){
      body{
        min-height:100dvh;
        overflow:auto;
        align-items:flex-start;
        padding:24px 16px;
      }

      body::after{
        width:520px;
        height:520px;
        right:-280px;
        top:72px;
      }

      .login-page{
        max-width:380px;
        min-height:calc(100dvh - 48px);
        gap:20px;
      }

      .integro-login-wordmark{
        font-size:32px;
        letter-spacing:-1.6px;
      }

      .login-card{
        max-width:370px;
        border-radius:24px;
        padding:28px 22px 24px;
      }

      .login-head{
        margin-bottom:21px;
      }

      .login-title{
        font-size:20px;
      }


      .login-kicker{
        height:26px;
        font-size:10px;
        margin-bottom:10px;
      }

      label{
        font-size:10.5px;
        margin-bottom:7px;
      }

      .input{
        height:52px;
        border-radius:14px;
        font-size:14px;
        padding-left:48px;
      }

      .input-wrap{
        margin-bottom:16px;
      }

      .input-wrap svg{
        left:16px;
        width:18px;
        height:18px;
      }

      .login-btn{
        height:54px;
        border-radius:14px;
        font-size:14.5px;
      }

      .divider{
        margin:22px 0 17px;
      }
    }

    @media(max-width:380px){
      body{
        padding:20px 12px;
      }

      .login-page{
        min-height:calc(100dvh - 40px);
      }

      .integro-login-wordmark{
        font-size:29px;
      }

      .login-card{
        padding:26px 18px 22px;
        border-radius:22px;
      }

      .input{
        height:50px;
      }
    }
  </style>
</head>

<body>

  <main class="login-page">

    <div class="logo" aria-label="ÍNTEGRO">
      <div class="integro-login-wordmark">
        <span class="integro-login-logo-white">ÍNTE</span><span class="integro-login-logo-orange">GRO</span>
      </div>
    </div>

    <section class="login-card">

      <label for="email">Email</label>
      <div class="input-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
          <circle cx="12" cy="7" r="4"/>
        </svg>

        <input
          id="email"
          class="input"
          type="email"
          placeholder="seuemail@empresa.com"
          autocomplete="email"
        >
      </div>

      <label for="senha">Senha</label>
      <div class="input-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="11" width="18" height="11" rx="2"/>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>

        <input
          id="senha"
          class="input"
          type="password"
          placeholder="Digite sua senha"
          autocomplete="current-password"
        >

        <button
          class="toggle-pass"
          type="button"
          onclick="toggleSenha()"
          aria-label="Mostrar senha"
        >
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7S1 12 1 12Z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>

      <button class="login-btn" onclick="login()">
        Entrar
      </button>

      <div class="divider">ou</div>

      <div class="forgot" onclick="recuperarSenha()">
        Esqueci minha senha
      </div>

      <div id="statusLogin" class="status"></div>

    </section>

  </main>

  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

  <!-- Infraestrutura -->
  <script src="js/firebase-config.js"></script>
  <script src="js/config.js"></script>
  <script src="js/state.js"></script>

  <!-- Serviços -->
  <script src="js/services/firestore.js"></script>

  <!-- Utilitários -->
  <script src="js/utils/validators.js"></script>
  <script src="js/utils/ui-helpers.js"></script>

  <!-- Core da aplicação -->
  <script src="js/app.js"></script>
  <script src="js/auth.js?v=3"></script>

  <!-- Helpers de login -->
  <script>
    function toggleSenha(){
      const senha = document.getElementById("senha");

      senha.type =
        senha.type === "password"
          ? "text"
          : "password";
    }

    function mostrarStatusLogin(mensagem) {
      const statusEl = document.getElementById("statusLogin");
      if (!statusEl) return;

      statusEl.innerHTML = mensagem;
      statusEl.classList.add("show");

      // Auto-hide after 5 seconds
      setTimeout(() => {
        statusEl.classList.remove("show");
      }, 5000);
    }
  </script>

</body>
</html>
