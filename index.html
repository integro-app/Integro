<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ÍNTEGRO • Login</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:"Inter",sans-serif}

    body{
      min-height:100vh;
      background:
        radial-gradient(circle at top left, rgba(255,107,0,.18), transparent 26%),
        radial-gradient(circle at bottom right, rgba(0,114,255,.22), transparent 34%),
        radial-gradient(circle at center right, rgba(14,165,233,.08), transparent 35%),
        linear-gradient(135deg,#020617 0%,#061426 45%,#071a33 100%);
      color:#fff;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
      overflow:hidden;
      position:relative;
    }

    body::before{
      content:"";
      position:absolute;
      inset:0;
      background-image:
        linear-gradient(rgba(255,255,255,.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.025) 1px, transparent 1px);
      background-size:42px 42px;
      opacity:.5;
      pointer-events:none;
    }

    body::after{
      content:"";
      position:absolute;
      width:900px;
      height:900px;
      border:1px solid rgba(255,255,255,.045);
      border-radius:50%;
      right:-260px;
      top:80px;
      pointer-events:none;
    }

    .login-page{
      width:100%;
      max-width:760px;
      min-height:820px;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:58px;
      position:relative;
      z-index:2;
    }

    .logo{
      font-size:88px;
      font-weight:900;
      letter-spacing:-5px;
      line-height:1;
      text-shadow:0 12px 26px rgba(0,0,0,.32);
    }

    .logo .white{
      color:#fff;
    }

    .logo .orange{
      background:linear-gradient(135deg,#ffb100 0%,#ff7a00 45%,#ff6b00 100%);
      -webkit-background-clip:text;
      color:transparent;
    }

    .login-card{
      width:100%;
      max-width:620px;
      background:linear-gradient(180deg,rgba(255,255,255,.105),rgba(255,255,255,.045));
      border:1px solid rgba(226,232,240,.34);
      border-radius:42px;
      padding:58px 54px;
      box-shadow:
        0 35px 90px rgba(0,0,0,.45),
        inset 0 1px 0 rgba(255,255,255,.20);
      backdrop-filter:blur(28px);
    }

    .login-card h1{
      text-align:center;
      font-size:42px;
      font-weight:900;
      letter-spacing:-1.8px;
      margin-bottom:14px;
      color:#fff;
      text-shadow:0 8px 18px rgba(0,0,0,.28);
    }

    .login-card .subtitle{
      max-width:420px;
      margin:0 auto 42px;
      text-align:center;
      color:#cbd5e1;
      font-size:18px;
      line-height:1.55;
      font-weight:500;
    }

    label{
      display:block;
      font-size:14px;
      color:#dbeafe;
      font-weight:900;
      letter-spacing:.8px;
      margin-bottom:12px;
      text-transform:uppercase;
    }

    .input-wrap{
      position:relative;
      margin-bottom:32px;
    }

    .input-wrap svg{
      position:absolute;
      left:24px;
      top:50%;
      transform:translateY(-50%);
      width:24px;
      height:24px;
      color:#cbd5e1;
      opacity:.95;
      pointer-events:none;
    }

    .input{
      width:100%;
      height:74px;
      border-radius:18px;
      border:1px solid rgba(226,232,240,.30);
      background:rgba(15,23,42,.26);
      color:#fff;
      outline:none;
      padding:0 24px 0 68px;
      font-size:20px;
      font-weight:700;
      box-shadow:inset 0 1px 0 rgba(255,255,255,.06);
      transition:.2s;
    }

    .input::placeholder{
      color:rgba(203,213,225,.72);
      font-weight:700;
    }

    .input:focus{
      border-color:rgba(255,177,0,.72);
      background:rgba(15,23,42,.36);
      box-shadow:
        0 0 0 5px rgba(255,177,0,.12),
        inset 0 1px 0 rgba(255,255,255,.08);
    }

    .toggle-pass{
      position:absolute;
      right:22px;
      top:50%;
      transform:translateY(-50%);
      background:transparent;
      border:none;
      color:#cbd5e1;
      cursor:pointer;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .toggle-pass svg{
      position:static;
      transform:none;
      width:25px;
      height:25px;
    }

    .login-btn{
      width:100%;
      height:78px;
      border:none;
      border-radius:18px;
      background:linear-gradient(135deg,#ffb100 0%,#ff7a00 45%,#ff5f00 100%);
      color:#fff;
      font-size:21px;
      font-weight:900;
      cursor:pointer;
      box-shadow:
        0 22px 42px rgba(255,107,0,.35),
        inset 0 1px 0 rgba(255,255,255,.30);
      transition:.2s;
      margin-top:10px;
    }

    .login-btn:hover{
      transform:translateY(-2px);
      filter:saturate(1.08);
    }

    .divider{
      display:flex;
      align-items:center;
      gap:22px;
      margin:34px 0 26px;
      color:#94a3b8;
      font-size:16px;
      font-weight:800;
    }

    .divider::before,
    .divider::after{
      content:"";
      flex:1;
      height:1px;
      background:rgba(226,232,240,.25);
    }

    .forgot{
      text-align:center;
      color:#bfdbfe;
      font-size:19px;
      font-weight:600;
      text-decoration:underline;
      cursor:pointer;
    }

    .forgot:hover{
      color:#ffb100;
    }

    .status{
      display:none;
      margin-top:22px;
      padding:14px 16px;
      border-radius:16px;
      background:rgba(15,23,42,.34);
      border:1px solid rgba(226,232,240,.20);
      color:#dbeafe;
      font-size:14px;
      font-weight:700;
      line-height:1.5;
    }

    @media(max-width:760px){
      body{
        overflow:auto;
        align-items:flex-start;
        padding:28px 18px;
      }

      .login-page{
        min-height:auto;
        gap:34px;
      }

      .logo{
        font-size:56px;
        letter-spacing:-3px;
        margin-top:20px;
      }

      .login-card{
        border-radius:32px;
        padding:36px 26px;
      }

      .login-card h1{
        font-size:34px;
      }

      .login-card .subtitle{
        font-size:15px;
        margin-bottom:34px;
      }

      label{
        font-size:12px;
      }

      .input{
        height:62px;
        font-size:16px;
        padding-left:58px;
      }

      .input-wrap{
        margin-bottom:24px;
      }

      .input-wrap svg{
        left:20px;
        width:21px;
        height:21px;
      }

      .login-btn{
        height:66px;
        font-size:17px;
      }

      .forgot{
        font-size:16px;
      }
    }

    @media(max-width:380px){
      .logo{
        font-size:48px;
      }

      .login-card{
        padding:30px 20px;
      }

      .login-card h1{
        font-size:30px;
      }
    }
  </style>
</head>

<body>

  <main class="login-page">

    <div class="logo">
      <span class="white">ÍNTE</span><span class="orange">GRO</span>
    </div>

    <section class="login-card">

      <h1>Acessar sistema</h1>

      <p class="subtitle">
        Entre com suas credenciais para acessar a plataforma ÍNTEGRO.
      </p>

      <label for="email">Email</label>
      <div class="input-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
          <circle cx="12" cy="7" r="4"/>
        </svg>

        <input
          id="email"
          class="input"
          type="email"
          placeholder="seuemail@empresa.com"
          autocomplete="email"
        >
      </div>

      <label for="senha">Senha</label>
      <div class="input-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="11" width="18" height="11" rx="2"/>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>

        <input
          id="senha"
          class="input"
          type="password"
          placeholder="Digite sua senha"
          autocomplete="current-password"
        >

        <button
          class="toggle-pass"
          type="button"
          onclick="toggleSenha()"
          aria-label="Mostrar senha"
        >
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7S1 12 1 12Z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>

      <button class="login-btn" onclick="login()">
        Entrar na plataforma
      </button>

      <div class="divider">ou</div>

      <div class="forgot" onclick="recuperarSenha()">
        Esqueci minha senha
      </div>

      <div id="statusLogin" class="status"></div>

    </section>

  </main>

  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

  <script src="js/firebase-config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/app.js"></script>

  <script>
    function toggleSenha(){
      const senha = document.getElementById("senha");

      senha.type =
        senha.type === "password"
          ? "text"
          : "password";
    }
  </script>

</body>
</html>
